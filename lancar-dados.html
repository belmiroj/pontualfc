<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg-gray);
        }

        /* --- HEADER --- */
        header {
            background: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 70px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--bvb-yellow);
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .nav-link:hover {
            color: var(--bvb-yellow);
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            left: 0;
            background: var(--bvb-black);
            min-width: 180px;
            list-style: none;
            padding: 10px 0;
            border-bottom: 3px solid var(--bvb-yellow);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .submenu li a {
            color: #fff;
            padding: 10px 20px;
            display: block;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .submenu li a:hover {
            background: #222;
            color: var(--bvb-yellow);
        }

        .nav-item:hover .submenu {
            display: block;
        }

        /* --- FORMULÁRIO --- */
        .container {
            max-width: 800px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        h3 {
            border-left: 5px solid var(--bvb-yellow);
            padding-left: 10px;
            text-transform: uppercase;
            font-size: 1rem;
            color: var(--bvb-black);
        }

        select, 
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            padding: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 20px;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        button:hover {
            background: #222;
        }

        /* --- OUTPUT --- */
        textarea {
            width: 100%;
            height: 200px;
            background: #222;
            color: #2ecc71;
            padding: 15px;
            font-family: 'Consolas', monospace;
            margin-top: 20px;
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
        }

        /* --- TABELA DE ELENCO --- */
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            padding: 10px;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .input-mini {
            width: 50px !important;
            padding: 5px !important;
            margin: 0 !important;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>7
        <nav>
            <ul>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h3>Lançar Resultado</h3>
        
        <label style="font-size: 0.8rem; font-weight: bold; color: #666;">Selecione o Jogo:</label>
        <select id="sel-jogo"></select>
        
        <div style="display:flex; gap:10px; margin-top: 10px;">
            <input type="number" id="gp" placeholder="Gols Pontual">
            <input type="number" id="gc" placeholder="Gols Adv">
            <select id="status">
                <option value="vitoria">Vitória</option>
                <option value="empate">Empate</option>
                <option value="derrota">Derrota</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 40px;">✔</th>
                    <th>Jogador</th>
                    <th style="width: 60px;">Gols</th>
                    <th style="width: 60px;">Ast</th>
                </tr>
            </thead>
            <tbody id="elenco"></tbody>
        </table>

        <button onclick="gerar()">Gerar JSON de Resultado</button>
        
        <textarea id="out" readonly placeholder="O código JSON aparecerá aqui..."></textarea>
    </div>

    <script>
        const elenco = ["DIEGO", "SAYMONN", "DENIS", "BELMIRO", "ISMAEL", "DEIVID", "RANIERI", "ANTONIO", "LUIZ", "GUIMA", "GUILHERME", "JAIR"];
        let db = [];

        async function init() {
            try {
                const r = await fetch('jogos-2026.json');
                const d = await r.json(); 
                db = d.temporada_2026;

                document.getElementById('sel-jogo').innerHTML = db.map((j, i) => 
                    `<option value="${i}">${j.data} - ${j.visitante}</option>`
                ).join('');

                document.getElementById('elenco').innerHTML = elenco.map(n => `
                    <tr>
                        <td><input type="checkbox" class="pre" data-n="${n}"></td>
                        <td><strong>${n}</strong></td>
                        <td><input type="number" class="gol input-mini" data-n="${n}" value="0"></td>
                        <td><input type="number" class="ast input-mini" data-n="${n}" value="0"></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("Erro ao carregar dados:", e);
            }
        }

        function gerar() {
            const idx = document.getElementById('sel-jogo').value;
            const jogo = db[idx];
            const pres = [], gols = [], asts = [];

            elenco.forEach(n => {
                if (document.querySelector(`.pre[data-n="${n}"]`).checked) {
                    pres.push(n);
                }
                let g = parseInt(document.querySelector(`.gol[data-n="${n}"]`).value);
                let a = parseInt(document.querySelector(`.ast[data-n="${n}"]`).value);
                
                if (g > 0) gols.push({ nome: n, qtd: g });
                if (a > 0) asts.push({ nome: n, qtd: a });
            });

            const res = {
                ...jogo,
                placar_mandante: parseInt(document.getElementById('gp').value) || 0,
                placar_visitante: parseInt(document.getElementById('gc').value) || 0,
                status: document.getElementById('status').value,
                presencas: pres,
                gols_detalhes: gols,
                assist_detalhes: asts
            };

            document.getElementById('out').value = JSON.stringify(res, null, 2) + ",";
        }

        window.onload = init;
    </script>
</body>
</html>
