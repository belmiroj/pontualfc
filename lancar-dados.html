<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lançar Placar | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f0f0;
            padding: 40px 20px;
        }

        .main-card {
            background: #fff;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h2 {
            border-left: 8px solid var(--bvb-yellow);
            padding-left: 15px;
            text-transform: uppercase;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .stats-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .dinamico-item {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .btn-add {
            background: #2ecc71;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .btn-gerar {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            width: 100%;
            padding: 15px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: #1e1e1e;
            color: #a9dc76;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>Lançar Resultados</h2>
        
        <div class="grid-row">
            <div>
                <label>Gols PONTUAL FC</label>
                <input type="number" id="p_mandante" value="0">
            </div>
            <div>
                <label>Gols ADVERSÁRIO</label>
                <input type="number" id="p_visitante" value="0">
            </div>
            <div>
                <label>Status Final</label>
                <select id="status">
                    <option value="vitoria">VITÓRIA</option>
                    <option value="empate">EMPATE</option>
                    <option value="derrota">DERROTA</option>
                </select>
            </div>
        </div>

        <div class="stats-section">
            <div>
                <label>Artilheiros (Gols)</label>
                <div id="container-gols">
                    <div class="dinamico-item">
                        <input type="text" placeholder="Jogador" class="g-nome">
                        <input type="number" style="width:70px" class="g-qtd" value="1">
                    </div>
                </div>
                <button class="btn-add" onclick="add('container-gols', 'g')">+ Jogador</button>
            </div>

            <div>
                <label>Assistências</label>
                <div id="container-assis">
                    <div class="dinamico-item">
                        <input type="text" placeholder="Jogador" class="a-nome">
                        <input type="number" style="width:70px" class="a-qtd" value="1">
                    </div>
                </div>
                <button class="btn-add" onclick="add('container-assis', 'a')">+ Jogador</button>
            </div>
        </div>

        <button class="btn-gerar" onclick="gerar()">GERAR CÓDIGO ATUALIZADO</button>

        <textarea id="output" readonly></textarea>
    </div>

    <script>
        function add(id, pre) {
            const div = document.createElement('div');
            div.className = 'dinamico-item';
            div.innerHTML = `<input type="text" placeholder="Jogador" class="${pre}-nome"><input type="number" style="width:70px" class="${pre}-qtd" value="1">`;
            document.getElementById(id).appendChild(div);
        }

        function gerar() {
            const gols = [];
            document.querySelectorAll('.g-nome').forEach((el, i) => {
                if(el.value) gols.push({ nome: el.value.toUpperCase(), qtd: parseInt(document.querySelectorAll('.g-qtd')[i].value) });
            });

            const assist = [];
            document.querySelectorAll('.a-nome').forEach((el, i) => {
                if(el.value) assist.push({ nome: el.value.toUpperCase(), qtd: parseInt(document.querySelectorAll('.a-qtd')[i].value) });
            });

            const data = {
                placar_mandante: parseInt(document.getElementById('p_mandante').value),
                placar_visitante: parseInt(document.getElementById('p_visitante').value),
                status: document.getElementById('status').value,
                gols_detalhes: gols,
                assist_detalhes: assist
            };

            document.getElementById('output').value = "// Substitua os campos dentro do jogo no JSON:\n" + JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
