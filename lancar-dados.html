<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lançar Dados | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { border-left: 10px solid var(--bvb-yellow); padding-left: 15px; text-transform: uppercase; }

        .selecao-jogo {
            background: #eee;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .grid-placar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th { background: var(--bvb-black); color: var(--bvb-yellow); padding: 10px; text-align: left; }
        
        td { padding: 8px; border-bottom: 1px solid #ddd; }

        input[type="number"] { width: 60px; padding: 5px; }
        input[type="checkbox"] { transform: scale(1.5); }

        .btn-gerar {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            width: 100%;
            padding: 20px;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 30px;
        }

        textarea {
            width: 100%;
            height: 300px;
            margin-top: 20px;
            background: #1e1e1e;
            color: #a9dc76;
            padding: 15px;
            font-family: monospace;
            border-radius: 5px;
        }

        .presente-row { background: #fffde7; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lançar Dados da Partida</h2>

    <div class="selecao-jogo">
        <label>1. Selecione o jogo já cadastrado no JSON:</label>
        <select id="select-jogos" onchange="carregarDadosJogo()">
            <option value="">Carregando jogos...</option>
        </select>
    </div>

    <div id="formulario-dados" style="display:none;">
        <div class="grid-placar">
            <div>
                <label>Gols PONTUAL FC</label>
                <input type="number" id="p_mandante" value="0">
            </div>
            <div>
                <label>Gols ADVERSÁRIO</label>
                <input type="number" id="p_visitante" value="0">
            </div>
            <div>
                <label>Status Final</label>
                <select id="status">
                    <option value="vitoria">VITÓRIA</option>
                    <option value="empate">EMPATE</option>
                    <option value="derrota">DERROTA</option>
                </select>
            </div>
        </div>

        <h3>2. Elenco e Estatísticas</h3>
        <table>
            <thead>
                <tr>
                    <th>Presente?</th>
                    <th>Jogador</th>
                    <th>Gols</th>
                    <th>Assistências</th>
                </tr>
            </thead>
            <tbody id="tabela-jogadores">
                </tbody>
        </table>

        <button class="btn-gerar" onclick="gerarJSONCompleto()">GERAR NOVO CÓDIGO DO JOGO</button>
    </div>

    <textarea id="output" readonly placeholder="O código completo aparecerá aqui..."></textarea>
</div>

<script>
    const elenco = ["DIEGO", "SAYMONN", "DENIS", "BELMIRO", "ISMAEL", "DEIVID", "RANIERI", "ANTONIO", "LUIZ", "GUIMA", "GUILHERME", "JAIR"];
    let jogosMemoria = [];

    // Carrega os jogos do seu JSON para o Select
    async function iniciar() {
        try {
            const resp = await fetch('jogos-2026.json');
            const data = await resp.json();
            jogosMemoria = data.temporada_2026;
            
            const select = document.getElementById('select-jogos');
            select.innerHTML = '<option value="">Escolha uma partida...</option>';
            
            jogosMemoria.forEach((j, index) => {
                select.innerHTML += `<option value="${index}">${j.data} - vs ${j.visitante}</option>`;
            });
        } catch (e) {
            alert("Erro ao carregar jogos-2026.json. Certifique-se que o arquivo existe.");
        }
        
        // Criar linhas dos jogadores
        const corpo = document.getElementById('tabela-jogadores');
        elenco.forEach(nome => {
            corpo.innerHTML += `
                <tr id="row-${nome}">
                    <td><input type="checkbox" class="presenca" data-nome="${nome}" onchange="marcarLinha('${nome}')"></td>
                    <td><strong>${nome}</strong></td>
                    <td><input type="number" class="gols" data-nome="${nome}" value="0" min="0"></td>
                    <td><input type="number" class="assis" data-nome="${nome}" value="0" min="0"></td>
                </tr>
            `;
        });
    }

    function marcarLinha(nome) {
        const row = document.getElementById(`row-${nome}`);
        row.classList.toggle('presente-row');
    }

    function carregarDadosJogo() {
        const index = document.getElementById('select-jogos').value;
        if(index === "") {
            document.getElementById('formulario-dados').style.display = 'none';
            return;
        }
        document.getElementById('formulario-dados').style.display = 'block';
    }

    function gerarJSONCompleto() {
        const index = document.getElementById('select-jogos').value;
        const jogoOriginal = jogosMemoria[index];

        const presencas = [];
        const gols_detalhes = [];
        const assist_detalhes = [];

        // Coletar dados da tabela
        elenco.forEach(nome => {
            const presente = document.querySelector(`.presenca[data-nome="${nome}"]`).checked;
            const gols = parseInt(document.querySelector(`.gols[data-nome="${nome}"]`).value);
            const assis = parseInt(document.querySelector(`.assis[data-nome="${nome}"]`).value);

            if(presente) presencas.push(nome);
            if(gols > 0) gols_detalhes.push({ "nome": nome, "qtd": gols });
            if(assis > 0) assist_detalhes.push({ "nome": nome, "qtd": assis });
        });

        // Montar o objeto completo mantendo os dados fixos do jogo original
        const jogoAtualizado = {
            ...jogoOriginal, // Mantém ID, Data, Local, etc.
            "placar_mandante": parseInt(document.getElementById('p_mandante').value),
            "placar_visitante": parseInt(document.getElementById('p_visitante').value),
            "status": document.getElementById('status').value,
            "presencas": presencas,
            "gols_detalhes": gols_detalhes,
            "assist_detalhes": assist_detalhes
        };

        document.getElementById('output').value = JSON.stringify(jogoAtualizado, null, 2) + ",";
        window.scrollTo(0, document.body.scrollHeight);
    }

    window.onload = iniciar;
</script>

</body>
</html>
