<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lançar Resultados | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg-gray);
            color: var(--text-dark);
        }

        /* --- HEADER & NAVEGAÇÃO --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 70px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
        }

        nav a:hover {
            color: var(--bvb-yellow);
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            left: 0;
            background: var(--bvb-black);
            min-width: 180px;
            list-style: none;
            padding: 10px 0;
            border-bottom: 3px solid var(--bvb-yellow);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .submenu li a {
            color: #fff;
            padding: 10px 20px;
            display: block;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .submenu li a:hover {
            background: #222;
            color: var(--bvb-yellow);
        }

        .nav-item:hover .submenu {
            display: block;
        }

        /* --- CONTAINER PRINCIPAL --- */
        .container {
            max-width: 850px;
            margin: 30px auto;
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h3 {
            border-left: 5px solid var(--bvb-yellow);
            padding-left: 15px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--bvb-black);
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* --- BOTÕES E AÇÕES --- */
        .btn-acao {
            width: 100%;
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            border: none;
            padding: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-acao:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .add-player-box {
            display: flex;
            gap: 10px;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px dashed #ccc;
            align-items: center;
        }

        .btn-add {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- TABELA DE JOGADORES --- */
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            padding: 10px;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        .input-mini {
            width: 60px !important;
            padding: 5px !important;
            margin: 0 !important;
            text-align: center;
        }

        #status-msg {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html">Início</a></li>
                <li class="nav-item">
                    <a>Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a>Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h3>Lançar ou Editar Resultado</h3>

        <label>1. Selecione a Partida</label>
        <select id="sel-jogo" onchange="puxarDadosExistentes(this.value)">
            <option value="">Carregando jogos...</option>
        </select>

        <div style="display:flex; gap:15px;">
            <div style="flex:1">
                <label>Gols Pontual</label>
                <input type="number" id="gp" value="0">
            </div>
            <div style="flex:1">
                <label>Gols Adv</label>
                <input type="number" id="gc" value="0">
            </div>
            <div style="flex:1">
                <label>Resultado</label>
                <select id="status-jogo">
                    <option value="vitoria">Vitória</option>
                    <option value="empate">Empate</option>
                    <option value="derrota">Derrota</option>
                </select>
            </div>
        </div>

        <div class="add-player-box">
            <input type="text" id="novo-jogador-nome" placeholder="Nome do Jogador Extra" style="margin:0; flex:1">
            <button onclick="adicionarJogador()" class="btn-add">Adicionar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 40px;">✔</th>
                    <th>Jogador</th>
                    <th style="width: 70px;">Gols</th>
                    <th style="width: 70px;">Ast</th>
                    <th style="width: 70px;">Votos</th>
                </tr>
            </thead>
            <tbody id="elenco"></tbody>
        </table>

        <button id="btnSalvar" onclick="salvarResultado()" class="btn-acao">Salvar no Firebase</button>
        <div id="status-msg"></div>
    </div>

    <script>
        const BASE_URL = "https://dashboard-pontualfc-default-rtdb.firebaseio.com/temporada_2026";
        let listaJogadores = ["ANTONIO", "AUGUSTO", "BELMIRO", "CELSO", "CLESIO", "DEIVID", "DENIS", "DIEGO", "GUILHERME", "GUIMA", "ISMAEL", "JAIR", "LUIZ", "RANIERI", "ROGERIO", "SAYMONN"];
        let jogosDB = {};

        async function carregarJogos() {
            try {
                const r = await fetch(`${BASE_URL}.json`);
                jogosDB = await r.json();
                const select = document.getElementById('sel-jogo');
                select.innerHTML = '<option value="">-- Selecione um jogo --</option>';
                if (!jogosDB) return;

                Object.keys(jogosDB).forEach(key => {
                    const j = jogosDB[key];
                    select.innerHTML += `<option value="${key}">${j.data} - vs ${j.visitante} (${j.status === 'finished' ? 'Finalizado' : 'Aberto'})</option>`;
                });
            } catch (e) { console.error(e); }
        }

        function renderizarTabela() {
            const corpoTabela = document.getElementById('elenco');
            corpoTabela.innerHTML = listaJogadores.map(n => `
                <tr>
                    <td><input type="checkbox" class="pre" data-n="${n}"></td>
                    <td><strong>${n}</strong></td>
                    <td><input type="number" class="gol input-mini" data-n="${n}" value="0"></td>
                    <td><input type="number" class="ast input-mini" data-n="${n}" value="0"></td>
                    <td><input type="number" class="voto input-mini" data-n="${n}" value="0"></td>
                </tr>
            `).join('');
        }

        function puxarDadosExistentes(key) {
            if (!key || !jogosDB[key]) {
                resetarCampos();
                return;
            }
            const jogo = jogosDB[key];
            document.getElementById('gp').value = jogo.placar_mandante || 0;
            document.getElementById('gc').value = jogo.placar_visitante || 0;
            document.getElementById('status-jogo').value = jogo.resultado_tipo || "vitoria";

            renderizarTabela();

            if (jogo.presencas) {
                jogo.presencas.forEach(nome => {
                    const cb = document.querySelector(`.pre[data-n="${nome}"]`);
                    if (cb) cb.checked = true;
                });
            }

            if (jogo.gols_detalhes) {
                jogo.gols_detalhes.forEach(item => {
                    const inp = document.querySelector(`.gol[data-n="${item.nome}"]`);
                    if (inp) inp.value = item.qtd;
                });
            }

            if (jogo.assist_detalhes) {
                jogo.assist_detalhes.forEach(item => {
                    const inp = document.querySelector(`.ast[data-n="${item.nome}"]`);
                    if (inp) inp.value = item.qtd;
                });
            }

            if (jogo.votos_melhor) {
                jogo.votos_melhor.forEach(item => {
                    const inp = document.querySelector(`.voto[data-n="${item.nome}"]`);
                    if (inp) inp.value = item.qtd;
                });
            }
        }

        function resetarCampos() {
            document.getElementById('gp').value = 0;
            document.getElementById('gc').value = 0;
            renderizarTabela();
        }

        function adicionarJogador() {
            const input = document.getElementById('novo-jogador-nome');
            const nome = input.value.trim().toUpperCase();
            if (nome && !listaJogadores.includes(nome)) {
                listaJogadores.push(nome);
                renderizarTabela();
                input.value = "";
            }
        }

        async function salvarResultado() {
            const gameKey = document.getElementById('sel-jogo').value;
            const btn = document.getElementById('btnSalvar');
            if (!gameKey) { alert("Selecione um jogo!"); return; }

            const pres = [], gols = [], asts = [], votos = [];

            listaJogadores.forEach(n => {
                if (document.querySelector(`.pre[data-n="${n}"]`).checked) pres.push(n);
                let g = parseInt(document.querySelector(`.gol[data-n="${n}"]`).value) || 0;
                let a = parseInt(document.querySelector(`.ast[data-n="${n}"]`).value) || 0;
                let v = parseInt(document.querySelector(`.voto[data-n="${n}"]`).value) || 0;

                if (g > 0) gols.push({ nome: n, qtd: g });
                if (a > 0) asts.push({ nome: n, qtd: a });
                if (v > 0) votos.push({ nome: n, qtd: v });
            });

            const dadosAtualizados = {
                placar_mandante: parseInt(document.getElementById('gp').value) || 0,
                placar_visitante: parseInt(document.getElementById('gc').value) || 0,
                status: "finished",
                resultado_tipo: document.getElementById('status-jogo').value,
                presencas: pres,
                gols_detalhes: gols,
                assist_detalhes: asts,
                votos_melhor: votos
            };

            try {
                btn.disabled = true;
                btn.innerText = "Salvando...";
                await fetch(`${BASE_URL}/${gameKey}.json`, {
                    method: 'PATCH',
                    body: JSON.stringify(dadosAtualizados)
                });
                alert("Resultado atualizado!");
                carregarJogos();
            } catch (e) { alert("Erro ao salvar."); }
            finally { btn.disabled = false; btn.innerText = "Salvar no Firebase"; }
        }

        window.onload = () => { carregarJogos(); renderizarTabela(); };
    </script>
</body>
</html>
