<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Partida | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
            --bg-gray: #f4f4f4;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
        }

        /* --- HEADER & NAV --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: var(--bvb-yellow);
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .dropdown {
            position: relative;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--bvb-black);
            min-width: 180px;
            border-top: 3px solid var(--bvb-yellow);
            padding: 0;
            list-style: none;
        }

        .submenu li {
            border-bottom: 1px solid #222;
        }

        .submenu a {
            padding: 12px;
            display: block;
            font-size: 0.75rem;
        }

        .dropdown:hover .submenu {
            display: block;
        }

        /* --- FORMULÁRIO --- */
        .admin-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-top: 8px solid var(--bvb-yellow);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-transform: uppercase;
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, 
        select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 1rem;
        }

        .btn-bvb {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            border: none;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'Arial Black', sans-serif;
            transition: 0.3s;
        }

        .btn-bvb:hover {
            background: #333;
        }

        #json-output {
            margin-top: 30px;
            background: #222;
            color: #0f0;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li><a href="jogos.html">Jogos</a></li>
                <li class="dropdown">
                    <a href="#">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastrar-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-presenca.html">Lançar Presença</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <h2>Agendar Partida</h2>
        <form id="form-agendar">
            <div class="form-group">
                <label>Data do Jogo</label>
                <input type="date" id="data" required>
            </div>
            <div class="form-group">
                <label>Dia da Semana (Ex: QUI)</label>
                <input type="text" id="dia" placeholder="QUI" required>
            </div>
            <div class="form-group">
                <label>Adversário</label>
                <input type="text" id="visitante" required>
            </div>
            <div class="form-group">
                <label>Rodada</label>
                <input type="text" id="rodada" placeholder="8º Jogo" required>
            </div>
            <button type="submit" class="btn-bvb">Gerar Código JSON</button>
        </form>
        <div id="json-output"></div>
    </div>

    <script>
        document.getElementById('form-agendar').onsubmit = function(e) {
            e.preventDefault();
            const novo = {
                id: Date.now(),
                data: document.getElementById('data').value,
                dia_semana: document.getElementById('dia').value.toUpperCase(),
                mandante: "PONTUAL FC",
                visitante: document.getElementById('visitante').value.toUpperCase(),
                placar_mandante: null,
                placar_visitante: null,
                campeonato: "Temporada 2026",
                rodada: document.getElementById('rodada').value,
                status: "upcoming",
                hora: "21:00",
                local: "Balduíno Soccer Indoor",
                presenca: []
            };
            const output = document.getElementById('json-output');
            output.style.display = 'block';
            output.textContent = JSON.stringify(novo, null, 2) + ",";
        };
    </script>
</body>
</html>
