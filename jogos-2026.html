<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos 2026 | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
            --bg-gray: #f4f4f4;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
        }

        /* --- MENU GLOBAL --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 70px;
        }

        .logo { color: var(--bvb-yellow); font-size: 1.5rem; text-decoration: none; text-transform: uppercase; }
        nav ul { list-style: none; display: flex; gap: 5px; margin: 0; padding: 0; height: 100%; }
        .nav-item { position: relative; display: flex; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-light); text-transform: uppercase; font-size: 0.75rem; padding: 0 15px; height: 100%; display: flex; align-items: center; transition: 0.3s; }
        .nav-link:hover { color: var(--bvb-yellow); background: rgba(255, 255, 255, 0.1); }
        .submenu { display: none; position: absolute; top: 70px; left: 0; background-color: var(--bvb-black); min-width: 200px; border-top: 3px solid var(--bvb-yellow); }
        .submenu a { padding: 12px 20px; display: block; color: white; text-decoration: none; font-size: 0.7rem; border-bottom: 1px solid #222; }
        .nav-item:hover .submenu { display: block; }

        /* --- CONTEÚDO --- */
        .container { padding: 40px 10%; }
        .month-title { background: var(--bvb-black); color: var(--bvb-yellow); padding: 10px 20px; display: inline-block; margin-bottom: 20px; text-transform: uppercase; }
        .game-card { background: #fff; margin-bottom: 10px; display: grid; grid-template-columns: 100px 1fr 100px 1fr 120px; align-items: center; padding: 15px; border-left: 6px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .vitoria { border-left-color: #2ecc71; }
        .derrota { border-left-color: #e74c3c; }
        .empate { border-left-color: #f1c40f; }
        .score-box { background: #eee; text-align: center; padding: 10px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container" id="jogos-lista">
        <h2 class="month-title">Temporada 2026</h2>
        </div>

    <script>
        async function carregar() {
            const resp = await fetch('jogos-2026.json');
            const data = await resp.json();
            const container = document.getElementById('jogos-lista');
            data.temporada_2026.forEach(j => {
                const placar = j.status === 'upcoming' ? 'VS' : `${j.placar_mandante} - ${j.placar_visitante}`;
                container.innerHTML += `
                    <div class="game-card ${j.status}">
                        <div style="font-size:0.8rem">${j.data}<br><strong>${j.dia_semana}</strong></div>
                        <div style="text-align:right; font-weight:bold">${j.mandante}</div>
                        <div class="score-box">${placar}</div>
                        <div style="font-weight:bold">${j.visitante}</div>
                        <div style="text-align:center; font-size:0.7rem">${j.rodada}<br><strong>${j.status.toUpperCase()}</strong></div>
                    </div>
                `;
            });
        }
        window.onload = carregar;
    </script>
</body>
</html>
