<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos 2026 | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
            --bg-gray: #f4f4f4;
            --win: #2ecc71;
            --lose: #e74c3c;
            --draw: #f1c40f;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
        }

        /* --- HEADER & MENU --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            font-size: 1.5rem;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav, nav ul {
            height: 100%;
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-item {
            position: relative;
            height: 100%;
        }

        .nav-link {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--bvb-yellow);
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            left: 0;
            background: var(--bvb-black);
            min-width: 200px;
            border-top: 3px solid var(--bvb-yellow);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .nav-item:hover .submenu {
            display: block;
        }

        .submenu a {
            color: #fff;
            padding: 15px 20px;
            display: block;
            text-decoration: none;
            font-size: 0.75rem;
            border-bottom: 1px solid #222;
        }

        .submenu a:hover {
            background: #222;
            color: var(--bvb-yellow);
        }

        /* --- LISTAGEM DE JOGOS --- */
        .container {
            padding: 40px 10%;
        }

        .game-card {
            background: #fff;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 100px 1fr 100px 1fr 120px;
            align-items: center;
            padding: 20px;
            border-left: 6px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .vitoria { border-left-color: var(--win); }
        .derrota { border-left-color: var(--lose); }
        .empate  { border-left-color: var(--draw); }

        .game-date {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.2;
        }

        .score-box {
            background: #eee;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 1.3rem;
            border-radius: 4px;
        }

        .team-name {
            font-size: 1rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container" id="lista-jogos">
        </div>

    <script>
        async function carregar() {
            try {
                const resp = await fetch('jogos-2026.json');
                const data = await resp.json();
                const container = document.getElementById('lista-jogos');
                
                data.temporada_2026.forEach(j => {
                    const placar = j.status === 'upcoming' ? 'VS' : `${j.placar_mandante} - ${j.placar_visitante}`;
                    container.innerHTML += `
                        <div class="game-card ${j.status}">
                            <div class="game-date">${j.data}<br><strong>${j.dia_semana}</strong></div>
                            <div style="text-align:right" class="team-name">${j.mandante}</div>
                            <div class="score-box">${placar}</div>
                            <div style="text-align:left" class="team-name">${j.visitante}</div>
                            <div style="text-align:center; font-size:0.7rem">
                                <strong>${j.status.toUpperCase()}</strong><br>${j.rodada}
                            </div>
                        </div>
                    `;
                });
            } catch (e) { console.error("Erro ao carregar JSON"); }
        }
        window.onload = carregar;
    </script>
</body>
</html>
