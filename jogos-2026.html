<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --win: #2ecc71;
            --draw: #f1c40f;
            --loss: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg-gray);
        }

        /* --- HEADER --- */
        header {
            background: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- CONTEÚDO --- */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .game-card {
            background: #fff;
            margin-bottom: 15px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 80px 1fr 100px 1fr;
            align-items: center;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-left: 6px solid #ccc;
        }

        /* Cores dinâmicas do Card */
        .game-card.vitoria {
            border-left-color: var(--win);
        }

        .game-card.empate {
            border-left-color: var(--draw);
        }

        .game-card.derrota {
            border-left-color: var(--loss);
        }

        .date {
            font-size: 0.7rem;
            color: #888;
            font-weight: bold;
        }

        .team {
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .score {
            background: #111;
            color: var(--bvb-yellow);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: 900;
            margin: 0 10px;
        }

        /* Ajuste para Mobile */
        @media (max-width: 600px) {
            .game-card {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 10px;
            }
            .team {
                text-align: center !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Cadastrar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container" id="lista"></div>

    <script>
        async function carregar() {
            try {
                const resp = await fetch('jogos-2026.json');
                const data = await resp.json();
                const lista = document.getElementById('lista');
                
                data.temporada_2026.forEach(j => {
                    const placar = j.status === 'upcoming' 
                        ? 'VS' 
                        : `${j.placar_mandante} - ${j.placar_visitante}`;
                    
                    lista.innerHTML += `
                        <div class="game-card ${j.status}">
                            <div class="date">${j.data}</div>
                            <div class="team" style="text-align:right">${j.mandante}</div>
                            <div class="score">${placar}</div>
                            <div class="team">${j.visitante}</div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar jogos:", error);
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
