<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogos 2026 | Pontual FC</title>
    <style>
        :root { --bvb-yellow: #FDE100; --bvb-black: #000; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        
        header { background: var(--bvb-black); border-bottom: 5px solid var(--bvb-yellow); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--bvb-yellow); font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        nav ul { list-style: none; display: flex; gap: 15px; }
        nav a { color: #fff; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; }

        .container { padding: 30px 10%; }
        .game-card { background: #fff; margin-bottom: 10px; display: grid; grid-template-columns: 100px 1fr 80px 1fr 100px; align-items: center; padding: 15px; border-left: 5px solid #ccc; }
        .vitoria { border-left-color: #2ecc71; }
        .derrota { border-left-color: #e74c3c; }
        .score { background: #eee; text-align: center; font-weight: bold; padding: 10px; }
        .month-title { background: var(--bvb-black); color: var(--bvb-yellow); padding: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="jogos-2026.html">Jogos</a></li>
            </ul>
        </nav>
    </header>

    <div class="container" id="lista-jogos">
        <p>Carregando jogos...</p>
    </div>

    <script>
        async function carregarJogos() {
            const resp = await fetch('jogos-2026.json');
            const data = await resp.json();
            const container = document.getElementById('lista-jogos');
            container.innerHTML = '<h2 class="month-title">TEMPORADA 2026</h2>';

            data.temporada_2026.forEach(j => {
                const placar = j.status === 'upcoming' ? 'VS' : `${j.placar_mandante} - ${j.placar_visitante}`;
                container.innerHTML += `
                    <div class="game-card ${j.status}">
                        <div style="font-size:0.8rem">${j.data}<br><strong>${j.dia_semana}</strong></div>
                        <div style="text-align:right"><strong>${j.mandante}</strong></div>
                        <div class="score">${placar}</div>
                        <div><strong>${j.visitante}</strong></div>
                        <div style="font-size:0.7rem; text-align:center">${j.status.toUpperCase()}<br>${j.rodada}</div>
                    </div>
                `;
            });
        }
        window.onload = carregarJogos;
    </script>
</body>
</html>
