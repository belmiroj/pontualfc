<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos 2026 | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
            --bg-gray: #f4f4f4;
            --win-green: #2ecc71;
            --lose-red: #e74c3c;
            --draw-yellow: #f1c40f;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: var(--bvb-black);
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: var(--bvb-yellow);
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--bvb-yellow);
        }

        /* --- CONTEÚDO --- */
        .container {
            padding: 40px 10%;
        }

        .month-title {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            padding: 12px 20px;
            margin: 30px 0 15px 0;
            text-transform: uppercase;
            font-size: 1.1rem;
            clip-path: polygon(0% 0%, 95% 0%, 100% 100%, 0% 100%);
            display: inline-block;
        }

        .game-card {
            background: #ffffff;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 100px 1fr 100px 1fr 120px;
            align-items: center;
            padding: 20px;
            border-left: 6px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: scale(1.01);
        }

        /* Status das Bordas */
        .vitoria { border-left-color: var(--win-green); }
        .derrota { border-left-color: var(--lose-red); }
        .empate { border-left-color: var(--draw-yellow); }
        .upcoming { border-left-color: var(--bvb-black); }

        .game-date {
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            line-height: 1.2;
        }

        .game-date strong {
            font-size: 1.2rem;
            display: block;
            color: #000;
        }

        .team-name {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1rem;
        }

        .team-right { text-align: left; padding-left: 15px; }
        .team-left { text-align: right; padding-right: 15px; }

        .score-box {
            background: #eeeeee;
            text-align: center;
            padding: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 4px;
        }

        .match-info-col {
            text-align: center;
            font-size: 0.7rem;
            color: #777;
            text-transform: uppercase;
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .game-card {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
            }
            .match-info-col {
                grid-column: span 3;
                border-top: 1px solid #eee;
                padding-top: 10px;
            }
            .container { padding: 20px 5%; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="jogos-2026.html">Jogos</a></li>
                <li><a href="cadastro-partida.html">Cadastros</a></li>
            </ul>
        </nav>
    </header>

    <div class="container" id="jogos-container">
        <p style="text-align: center;">Carregando temporada 2026...</p>
    </div>

    <script>
        async function renderizar() {
            try {
                const resp = await fetch('jogos-2026.json');
                const data = await resp.json();
                const container = document.getElementById('jogos-container');
                container.innerHTML = '<h2 class="month-title">Temporada 2026</h2>';

                data.temporada_2026.forEach(j => {
                    const placar = j.status === 'upcoming' ? 'VS' : `${j.placar_mandante} - ${j.placar_visitante}`;
                    const dataObj = new Date(j.data + "T00:00:00");
                    const dia = dataObj.getDate();
                    const mes = dataObj.toLocaleString('pt-br', { month: 'short' }).toUpperCase();

                    container.innerHTML += `
                        <div class="game-card ${j.status}">
                            <div class="game-date">${dia} ${mes} <strong>${j.dia_semana}</strong></div>
                            <div class="team-name team-left">${j.mandante}</div>
                            <div class="score-box">${placar}</div>
                            <div class="team-name team-right">${j.visitante}</div>
                            <div class="match-info-col">
                                <strong>${j.status.toUpperCase()}</strong><br>
                                ${j.rodada}
                            </div>
                        </div>
                    `;
                });
            } catch (e) { container.innerHTML = "Erro ao carregar JSON."; }
        }
        window.onload = renderizar;
    </script>
</body>
</html>
