<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --win: #2ecc71;
            --draw: #f1c40f;
            --loss: #e74c3c;
            --upcoming: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--bg-gray);
            color: #333;
            font-size: 16px; /* Evita zoom no iOS */
        }

        /* --- HEADER PADRONIZADO --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 15px;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 70px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            right: 0;
            background: var(--bvb-black);
            min-width: 170px;
            list-style: none;
            padding: 10px 0;
            border-bottom: 3px solid var(--bvb-yellow);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .submenu li a {
            color: #fff;
            padding: 12px 20px;
            display: block;
            font-size: 0.8rem;
        }

        .nav-item:hover .submenu { display: block; }

        /* --- FILTRO --- */
        .filter-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            justify-content: flex-end;
        }

        #month-filter {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 200px;
            background: #fff;
            font-size: 0.9rem;
        }

        /* --- LISTAGEM --- */
        .container {
            max-width: 900px;
            margin: 0 auto 50px auto;
            padding: 0 15px;
        }

        .game-card {
            background: #fff;
            margin-bottom: 12px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-left: 6px solid #ccc;
            cursor: pointer;
            transition: 0.2s;
        }

        .game-header {
            display: grid;
            grid-template-columns: 80px 1fr 80px 1fr;
            align-items: center;
            padding: 15px;
            gap: 5px;
        }

        .game-card.vitoria { border-left-color: var(--win); }
        .game-card.empate { border-left-color: var(--draw); }
        .game-card.derrota { border-left-color: var(--loss); }
        .game-card.upcoming { border-left-color: var(--upcoming); }

        .date { font-size: 0.7rem; color: #666; font-weight: bold; text-align: center; line-height: 1.2; }
        .team { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; }

        .score-box { text-align: center; }

        .score {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: 900;
            display: inline-block;
            font-size: 0.9rem;
            min-width: 40px;
        }

        /* --- DETALHES --- */
        .game-details {
            display: none;
            background: #f9f9f9;
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1.5fr;
            gap: 20px;
        }

        .detail-title {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 8px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 3px;
        }

        .player-list { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; }
        .player-list li { margin-bottom: 4px; }

        /* Ajustes Mobile */
        @media (max-width: 600px) {
            .game-header {
                grid-template-columns: 1fr 2fr 1fr; /* Esconde o "Pontual FC" fixo se necessário ou ajusta layout */
                grid-template-areas: 
                    "date date date"
                    "teamA score teamB";
            }
            .date { grid-area: date; margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
            .team:nth-child(2) { grid-area: teamA; text-align: center !important; }
            .score-box { grid-area: score; }
            .team:nth-child(4) { grid-area: teamB; text-align: center !important; }
            
            .details-grid { grid-template-columns: 1fr; gap: 15px; }
            .logo { font-size: 1rem; }
        }

        @media (min-width: 601px) {
            .team { font-size: 1rem; }
            .date { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html">Início</a></li>
                <li class="nav-item">
                    <a>Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a>Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="filter-container">
        <select id="month-filter" onchange="filtrarJogos()">
            <option value="todos">Todos os Meses</option>
            <option value="01">Janeiro</option>
            <option value="02">Fevereiro</option>
            <option value="03">Março</option>
            <option value="04">Abril</option>
            <option value="05">Maio</option>
            <option value="06">Junho</option>
            <option value="07">Julho</option>
            <option value="08">Agosto</option>
            <option value="09">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
        </select>
    </div>

    <div class="container" id="lista"></div>

    <script>
        const BASE_URL = "https://dashboard-pontualfc-default-rtdb.firebaseio.com/temporada_2026";
        let todosJogos = [];

        async function carregar() {
            try {
                const resp = await fetch(`${BASE_URL}.json`);
                const data = await resp.json();
                if (!data) return;

                todosJogos = Object.keys(data).map(key => ({ id: key, ...data[key] }))
                    .sort((a, b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));

                renderizar(todosJogos);
            } catch (error) {
                console.error("Erro:", error);
            }
        }

        function renderizar(listaParaExibir) {
            const container = document.getElementById('lista');
            container.innerHTML = '';

            listaParaExibir.forEach(j => {
                const isFinished = j.status === 'finished';
                const classeStatus = isFinished ? (j.resultado_tipo || '') : 'upcoming';
                
                const listaGols = j.gols_detalhes ? j.gols_detalhes.map(g => `<li>${g.nome} (${g.qtd})</li>`).join('') : '<li>-</li>';
                const listaAst = j.assist_detalhes ? j.assist_detalhes.map(a => `<li>${a.nome} (${a.qtd})</li>`).join('') : '<li>-</li>';
                const listaPre = j.presencas ? j.presencas.join(', ') : 'Não registrada';

                container.innerHTML += `
                    <div class="game-card ${classeStatus}" onclick="toggleDetails('${j.id}')">
                        <div class="game-header">
                            <div class="date">${j.data}<br>${j.dia_semana || ''}</div>
                            <div class="team" style="text-align:right">${j.mandante}</div>
                            <div class="score-box">
                                <div class="score">${isFinished ? j.placar_mandante + ' - ' + j.placar_visitante : 'VS'}</div>
                            </div>
                            <div class="team">${j.visitante}</div>
                        </div>
                        
                        <div class="game-details" id="detalhe-${j.id}">
                            <div class="details-grid">
                                <div>
                                    <div class="detail-title">⚽ Gols</div>
                                    <ul class="player-list">${listaGols}</ul>
                                </div>
                                <div>
                                    <div class="detail-title">👟 Assistências</div>
                                    <ul class="player-list">${listaAst}</ul>
                                </div>
                                <div>
                                    <div class="detail-title">📋 Presenças</div>
                                    <p style="color:#555; line-height:1.4; font-size:0.8rem; margin:0">${listaPre}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function toggleDetails(id) {
            const div = document.getElementById(`detalhe-${id}`);
            const isVisible = div.style.display === 'block';
            // Opcional: fechar outros ao abrir um
            // document.querySelectorAll('.game-details').forEach(d => d.style.display = 'none');
            div.style.display = isVisible ? 'none' : 'block';
        }

        function filtrarJogos() {
            const mesSelecionado = document.getElementById('month-filter').value;
            if (mesSelecionado === 'todos') {
                renderizar(todosJogos);
            } else {
                const filtrados = todosJogos.filter(j => j.data.split('/')[1] === mesSelecionado);
                renderizar(filtrados);
            }
        }

        window.onload = carregar;
    </script>
</body>
</html>
