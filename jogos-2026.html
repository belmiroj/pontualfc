<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --win: #2ecc71;
            --draw: #f1c40f;
            --loss: #e74c3c;
            --upcoming: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--bg-gray);
            color: #333;
        }

        /* --- HEADER PADRONIZADO (RESTAURADO) --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 15px;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 70px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            right: 0;
            background: var(--bvb-black);
            min-width: 170px;
            list-style: none;
            padding: 10px 0;
            border-bottom: 3px solid var(--bvb-yellow);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .submenu li a {
            color: #fff;
            padding: 12px 20px;
            display: block;
            font-size: 0.8rem;
        }

        .nav-item:hover .submenu { display: block; }

        /* --- FILTRO --- */
        .filter-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            justify-content: flex-end;
        }

        #month-filter {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-weight: bold;
            background: #fff;
        }

        /* --- LISTAGEM DE JOGOS --- */
        .container {
            max-width: 900px;
            margin: 0 auto 50px auto;
            padding: 0 15px;
        }

        .game-card {
            background: #fff;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-left: 6px solid #ccc;
            cursor: pointer;
            overflow: hidden;
        }

        .game-card.vitoria { border-left-color: var(--win); }
        .game-card.empate { border-left-color: var(--draw); }
        .game-card.derrota { border-left-color: var(--loss); }
        .game-card.upcoming { border-left-color: var(--upcoming); }

        .round-header {
            text-align: center;
            padding: 8px 0 0 0;
        }

        .round-tag {
            background: #f0f0f0;
            color: #666;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 15px;
            text-transform: uppercase;
            display: inline-block;
        }

        /* Grid Desktop corrigido */
        .game-header {
            display: grid;
            grid-template-columns: 100px 1fr 120px 1fr;
            align-items: center;
            padding: 15px 20px;
            text-align: center;
        }

        .date { font-size: 0.8rem; color: #666; font-weight: bold; border-right: 1px solid #eee; }
        
        .team { font-weight: 800; font-size: 1rem; text-transform: uppercase; padding: 0 10px; }
        .team.mandante { text-align: right; }
        .team.visitante { text-align: left; }

        .score-box { display: flex; justify-content: center; }
        .score {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 1.1rem;
            min-width: 50px;
        }

        /* --- DETALHES --- */
        .game-details {
            display: none;
            background: #fdfdfd;
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1.5fr;
            gap: 20px;
        }

        .detail-title {
            font-weight: 800;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }

        .player-list { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; line-height: 1.6; }

        /* --- RESPONSIVIDADE (MOBILE) --- */
        @media (max-width: 600px) {
            header { padding: 0 3%; }
            .logo { font-size: 1rem; }
            
            .game-header {
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-areas: 
                    "date date date"
                    "teamA score teamB";
                padding: 15px;
            }
            .date { grid-area: date; border-right: none; border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px; }
            .team.mandante { grid-area: teamA; text-align: center; font-size: 0.85rem; }
            .score-box { grid-area: score; }
            .team.visitante { grid-area: teamB; text-align: center; font-size: 0.85rem; }
            .details-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html">Início</a></li>
                <li class="nav-item">
                    <a>Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a>Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="filter-container">
        <select id="month-filter" onchange="filtrarJogos()">
            <option value="todos">Todos os Meses</option>
            <option value="01">Janeiro</option>
            <option value="02">Fevereiro</option>
            <option value="03">Março</option>
            <option value="04">Abril</option>
            <option value="05">Maio</option>
            <option value="06">Junho</option>
            <option value="07">Julho</option>
            <option value="08">Agosto</option>
            <option value="09">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
        </select>
    </div>

    <div class="container" id="lista"></div>

    <script>
        const BASE_URL = "https://dashboard-pontualfc-default-rtdb.firebaseio.com/temporada_2026";
        let todosJogos = [];

        async function carregar() {
            try {
                const resp = await fetch(`${BASE_URL}.json`);
                const data = await resp.json();
                if (!data) return;
                todosJogos = Object.keys(data).map(key => ({ id: key, ...data[key] }))
                    .sort((a, b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));
                renderizar(todosJogos);
            } catch (error) { console.error("Erro:", error); }
        }

        function renderizar(listaParaExibir) {
            const container = document.getElementById('lista');
            container.innerHTML = '';

            listaParaExibir.forEach(j => {
                const isFinished = j.status === 'finished';
                const classeStatus = isFinished ? (j.resultado_tipo || '') : 'upcoming';
                const listaGols = j.gols_detalhes ? j.gols_detalhes.map(g => `<li>${g.nome} (${g.qtd})</li>`).join('') : '<li>-</li>';
                const listaAst = j.assist_detalhes ? j.assist_detalhes.map(a => `<li>${a.nome} (${a.qtd})</li>`).join('') : '<li>-</li>';

                container.innerHTML += `
                    <div class="game-card ${classeStatus}" onclick="toggleDetails('${j.id}')">
                        <div class="round-header">
                            <span class="round-tag">${j.rodada || 'Amistoso'}</span>
                        </div>
                        <div class="game-header">
                            <div class="date">${j.data}<br>${j.dia_semana || ''}</div>
                            <div class="team mandante">${j.mandante}</div>
                            <div class="score-box">
                                <div class="score">${isFinished ? j.placar_mandante + ' - ' + j.placar_visitante : 'VS'}</div>
                            </div>
                            <div class="team visitante">${j.visitante}</div>
                        </div>
                        <div class="game-details" id="detalhe-${j.id}">
                            <div class="details-grid">
                                <div>
                                    <div class="detail-title">⚽ Gols</div>
                                    <ul class="player-list">${listaGols}</ul>
                                </div>
                                <div>
                                    <div class="detail-title">👟 Assistências</div>
                                    <ul class="player-list">${listaAst}</ul>
                                </div>
                                <div>
                                    <div class="detail-title">📋 Presenças</div>
                                    <p style="font-size:0.8rem; color:#666; margin:0">${j.presencas ? j.presencas.join(', ') : 'Não registrada'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function toggleDetails(id) {
            const div = document.getElementById(`detalhe-${id}`);
            div.style.display = div.style.display === 'block' ? 'none' : 'block';
        }

        function filtrarJogos() {
            const mes = document.getElementById('month-filter').value;
            renderizar(mes === 'todos' ? todosJogos : todosJogos.filter(j => j.data.split('/')[1] === mes));
        }

        window.onload = carregar;
    </script>
</body>
</html>
