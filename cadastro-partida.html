<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Partida | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: var(--text-dark);
        }

        /* --- HEADER GLOBAL --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 70px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            left: 0;
            background: var(--bvb-black);
            min-width: 180px;
            list-style: none;
            padding: 10px 0;
            border-bottom: 3px solid var(--bvb-yellow);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .submenu li a {
            color: #fff;
            padding: 10px 20px;
            display: block;
            text-decoration: none;
            font-size: 0.75rem;
        }

        .nav-item:hover .submenu {
            display: block;
        }

        /* --- FORMULÁRIO --- */
        .container {
            max-width: 550px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-box {
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h3 {
            border-left: 5px solid var(--bvb-yellow);
            padding-left: 15px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--bvb-black);
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .btn-acao {
            width: 100%;
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            border: none;
            padding: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-acao:disabled {
            background: #666;
            cursor: not-allowed;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #1e1e1e;
            color: #a9dc76;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            border-radius: 8px;
            margin-top: 10px;
            border: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html">Início</a></li>
                <li class="nav-item">
                    <a>Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a>Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h3>Novo Agendamento</h3>
            
            <div class="input-group">
                <label>Data da Partida</label>
                <input type="date" id="data">
            </div>
            
            <div class="input-group">
                <label>Nome do Adversário</label>
                <input type="text" id="visitante" placeholder="Ex: MALA FC">
            </div>
            
            <div class="input-group">
                <label>Rodada / Identificação</label>
                <input type="text" id="rodada" placeholder="Ex: 12º Jogo da Temporada">
            </div>
            
            <button class="btn-acao" id="btnSalvar" onclick="gerar()">Agendar e Salvar no Banco</button>
            
            <div class="output-container" style="margin-top: 20px;">
                <label>Log do Sistema</label>
                <textarea id="output" readonly placeholder="Aguardando ação..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://dashboard-pontualfc-default-rtdb.firebaseio.com/temporada_2026.json";

        function getDiaSemana(dataString) {
            const dias = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"];
            const date = new Date(dataString + 'T00:00:00');
            return dias[date.getDay()];
        }

        async function gerar() {
            const dataInput = document.getElementById('data').value;
            const visitanteInput = document.getElementById('visitante').value;
            const btn = document.getElementById('btnSalvar');

            if(!dataInput || !visitanteInput) {
                alert("Por favor, preencha a data e o adversário.");
                return;
            }

            const res = {
                id: Date.now(),
                data: dataInput.split('-').reverse().join('/'), // Converte para DD/MM/AAAA
                dia_semana: getDiaSemana(dataInput),
                mandante: "PONTUAL FC",
                visitante: visitanteInput.toUpperCase(),
                placar_mandante: null,
                placar_visitante: null,
                campeonato: "Temporada 2026",
                rodada: document.getElementById('rodada').value || "Amistoso",
                status: "upcoming",
                hora: "21:00",
                local: "Balduíno Soccer Indoor"
            };

            // Mostrar no textarea
            document.getElementById('output').value = "Gerando JSON...\n" + JSON.stringify(res, null, 2);

            // Enviar para o Firebase
            try {
                btn.disabled = true;
                btn.innerText = "Enviando para o Banco...";
                
                const response = await fetch(FIREBASE_URL, {
                    method: 'POST',
                    body: JSON.stringify(res),
                    headers: { 'Content-Type': 'application/json' }
                });

                if(response.ok) {
                    document.getElementById('output').value += "\n\n✅ SUCESSO: Partida agendada no Firebase!";
                    alert("Jogo agendado com sucesso!");
                    // Limpar campos
                    document.getElementById('visitante').value = "";
                    document.getElementById('rodada').value = "";
                } else {
                    throw new Error("Falha ao salvar");
                }
            } catch (error) {
                document.getElementById('output').value += "\n\n❌ ERRO: " + error.message;
                alert("Erro ao conectar com o Firebase.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Agendar e Salvar no Banco";
            }
        }
    </script>
</body>
</html>
