<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Partida | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: var(--text-dark);
        }

        /* --- HEADER GLOBAL --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--bvb-yellow);
        }

        /* --- FORMULÁRIO ESTILIZADO --- */
        .container {
            max-width: 550px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-box {
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h3 {
            border-left: 5px solid var(--bvb-yellow);
            padding-left: 15px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--bvb-black);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--bvb-yellow);
        }

        .btn-acao {
            width: 100%;
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            border: none;
            padding: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .btn-acao:hover {
            background: #222;
            transform: translateY(-2px);
        }

        .btn-acao:active {
            transform: translateY(0);
        }

        /* --- ÁREA DE CÓDIGO --- */
        .output-container {
            margin-top: 25px;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: #1e1e1e;
            color: #a9dc76;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
            resize: vertical;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        ::placeholder {
            color: #bbb;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Cadastrar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h3>Novo Agendamento</h3>
            
            <div class="input-group">
                <label>Data da Partida</label>
                <input type="date" id="data">
            </div>
            
            <div class="input-group">
                <label>Nome do Adversário</label>
                <input type="text" id="visitante" placeholder="Ex: MALA FC">
            </div>
            
            <div class="input-group">
                <label>Rodada / Identificação</label>
                <input type="text" id="rodada" placeholder="Ex: 12º Jogo da Temporada">
            </div>
            
            <button class="btn-acao" onclick="gerar()">Gerar Bloco JSON</button>
            
            <div class="output-container">
                <label>Código para o arquivo jogos-2026.json</label>
                <textarea id="output" readonly placeholder="O código JSON aparecerá aqui após clicar no botão..."></textarea>
            </div>
        </div>
    </div>

    <script>
        function gerar() {
            const dataInput = document.getElementById('data').value;
            if(!dataInput || !document.getElementById('visitante').value) {
                alert("Por favor, preencha a data e o adversário.");
                return;
            }

            const res = {
                id: Date.now(),
                data: dataInput,
                dia_semana: "QUI",
                mandante: "PONTUAL FC",
                visitante: document.getElementById('visitante').value.toUpperCase(),
                placar_mandante: null,
                placar_visitante: null,
                campeonato: "Temporada 2026",
                rodada: document.getElementById('rodada').value,
                status: "upcoming",
                hora: "21:00",
                local: "Balduíno Soccer Indoor"
            };
            
            document.getElementById('output').value = JSON.stringify(res, null, 2) + ",";
        }
    </script>
</body>
</html>
