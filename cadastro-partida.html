<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agendar Partida | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        /* --- HEADER & MENU --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            font-size: 1.5rem;
            text-decoration: none;
            font-family: 'Arial Black';
        }

        nav, nav ul {
            height: 100%;
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-item {
            position: relative;
            height: 100%;
        }

        .nav-link {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            left: 0;
            background: var(--bvb-black);
            min-width: 200px;
            border-top: 3px solid var(--bvb-yellow);
        }

        .nav-item:hover .submenu {
            display: block;
        }

        .submenu a {
            color: #fff;
            padding: 15px;
            display: block;
            text-decoration: none;
            font-size: 0.75rem;
        }

        /* --- FORMULÁRIO --- */
        .form-box {
            max-width: 500px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h3 {
            border-left: 6px solid var(--bvb-yellow);
            padding-left: 10px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-acao {
            width: 100%;
            background: #000;
            color: var(--bvb-yellow);
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-acao:hover { background: #333; }

        textarea {
            width: 100%;
            height: 150px;
            margin-top: 20px;
            background: #1e1e1e;
            color: #a9dc76;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            border-radius: 4px;
            border: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="form-box">
        <h3>Novo Agendamento</h3>
        <label>Data da Partida:</label>
        <input type="date" id="data">
        
        <label>Adversário:</label>
        <input type="text" id="visitante" placeholder="Ex: MALA FC">
        
        <label>Rodada:</label>
        <input type="text" id="rodada" placeholder="Ex: 12º Jogo">
        
        <button class="btn-acao" onclick="gerar()">Gerar Código JSON</button>
        <textarea id="output" readonly placeholder="O código aparecerá aqui..."></textarea>
    </div>

    <script>
        function gerar() {
            const res = {
                id: Date.now(),
                data: document.getElementById('data').value,
                dia_semana: "QUI",
                mandante: "PONTUAL FC",
                visitante: document.getElementById('visitante').value.toUpperCase(),
                placar_mandante: null,
                placar_visitante: null,
                campeonato: "Temporada 2026",
                rodada: document.getElementById('rodada').value,
                status: "upcoming",
                hora: "21:00",
                local: "Balduíno Soccer Indoor"
            };
            document.getElementById('output').value = JSON.stringify(res, null, 2) + ",";
        }
    </script>
</body>
</html>
