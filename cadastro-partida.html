<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Partidas | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --text-dark: #333;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: var(--text-dark);
        }

        /* --- HEADER GLOBAL --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 70px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            left: 0;
            background: var(--bvb-black);
            min-width: 180px;
            list-style: none;
            padding: 10px 0;
            border-bottom: 3px solid var(--bvb-yellow);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .submenu li a {
            color: #fff;
            padding: 10px 20px;
            display: block;
            text-decoration: none;
            font-size: 0.75rem;
        }

        .nav-item:hover .submenu { display: block; }

        /* --- FORMULÁRIO --- */
        .container {
            max-width: 550px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-box {
            background: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h3 {
            border-left: 5px solid var(--bvb-yellow);
            padding-left: 15px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--bvb-black);
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }

        .btn-acao {
            flex: 2;
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            border: none;
            padding: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-delete {
            flex: 1;
            background: var(--danger);
            color: white;
            border: none;
            padding: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            display: none; /* Só aparece na edição */
        }

        .btn-reset {
            background: #eee;
            color: #666;
            border: none;
            padding: 5px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #1e1e1e;
            color: #a9dc76;
            padding: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            border-radius: 8px;
            margin-top: 10px;
            border: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html">Início</a></li>
                <li class="nav-item">
                    <a>Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a>Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h3 id="form-title">Novo Agendamento</h3>
            
            <div class="input-group">
                <label>Editar Jogo Existente?</label>
                <select id="select-jogos" onchange="carregarDadosJogo(this.value)">
                    <option value="">-- NOVO CADASTRO --</option>
                </select>
                <button class="btn-reset" onclick="resetForm()">Limpar / Novo Jogo</button>
            </div>

            <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">
            
            <div class="input-group">
                <label>Data da Partida</label>
                <input type="date" id="data">
            </div>
            
            <div class="input-group">
                <label>Nome do Adversário</label>
                <input type="text" id="visitante" placeholder="Ex: MALA FC">
            </div>
            
            <div class="input-group">
                <label>Rodada / Identificação</label>
                <input type="text" id="rodada" placeholder="Ex: 12º Jogo da Temporada">
            </div>
            
            <div class="btn-group">
                <button class="btn-acao" id="btnSalvar" onclick="salvarNoBanco()">Agendar e Salvar</button>
                <button class="btn-delete" id="btnExcluir" onclick="excluirJogo()">Excluir</button>
            </div>
            
            <div class="output-container" style="margin-top: 20px;">
                <label>Log do Sistema</label>
                <textarea id="output" readonly placeholder="Aguardando ação..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://dashboard-pontualfc-default-rtdb.firebaseio.com/temporada_2026";
        let editKey = null; // Armazena a chave se estivermos editando
        let jogosLocais = {};

        // Carregar lista de jogos para o select ao abrir a página
        async function listarJogos() {
            try {
                const response = await fetch(`${BASE_URL}.json`);
                jogosLocais = await response.json();
                const select = document.getElementById('select-jogos');
                select.innerHTML = '<option value="">-- NOVO CADASTRO --</option>';
                
                if (jogosLocais) {
                    Object.keys(jogosLocais).forEach(key => {
                        const jogo = jogosLocais[key];
                        select.innerHTML += `<option value="${key}">${jogo.data} vs ${jogo.visitante}</option>`;
                    });
                }
            } catch (e) { console.error("Erro ao listar:", e); }
        }

        function carregarDadosJogo(key) {
            if (!key) { resetForm(); return; }
            
            editKey = key;
            const jogo = jogosLocais[key];
            
            // Preencher campos (precisa converter DD/MM/AAAA para YYYY-MM-DD para o input date)
            const partesData = jogo.data.split('/');
            document.getElementById('data').value = `${partesData[2]}-${partesData[1]}-${partesData[0]}`;
            document.getElementById('visitante').value = jogo.visitante;
            document.getElementById('rodada').value = jogo.rodada;

            document.getElementById('form-title').innerText = "Editar Partida";
            document.getElementById('btnSalvar').innerText = "Salvar Alterações";
            document.getElementById('btnExcluir').style.display = "block";
        }

        function resetForm() {
            editKey = null;
            document.getElementById('data').value = "";
            document.getElementById('visitante').value = "";
            document.getElementById('rodada').value = "";
            document.getElementById('select-jogos').value = "";
            document.getElementById('form-title').innerText = "Novo Agendamento";
            document.getElementById('btnSalvar').innerText = "Agendar e Salvar";
            document.getElementById('btnExcluir').style.display = "none";
            document.getElementById('output').value = "";
        }

        function getDiaSemana(dataString) {
            const dias = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"];
            const date = new Date(dataString + 'T00:00:00');
            return dias[date.getDay()];
        }

        async function salvarNoBanco() {
            const dataVal = document.getElementById('data').value;
            const visitanteVal = document.getElementById('visitante').value;
            if(!dataVal || !visitanteVal) { alert("Preencha os campos!"); return; }

            const payload = {
                data: dataVal.split('-').reverse().join('/'),
                dia_semana: getDiaSemana(dataVal),
                visitante: visitanteVal.toUpperCase(),
                rodada: document.getElementById('rodada').value || "Amistoso",
                mandante: "PONTUAL FC",
                status: editKey ? jogosLocais[editKey].status : "upcoming",
                hora: "21:00",
                local: "Balduíno Soccer Indoor"
            };

            const url = editKey ? `${BASE_URL}/${editKey}.json` : `${BASE_URL}.json`;
            const metodo = editKey ? 'PATCH' : 'POST';

            try {
                document.getElementById('btnSalvar').disabled = true;
                const response = await fetch(url, {
                    method: metodo,
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    alert(editKey ? "Atualizado com sucesso!" : "Agendado com sucesso!");
                    resetForm();
                    listarJogos();
                }
            } catch (e) { alert("Erro ao salvar."); }
            finally { document.getElementById('btnSalvar').disabled = false; }
        }

        async function excluirJogo() {
            if(!editKey) return;
            if(!confirm("Tem certeza que deseja EXCLUIR esta partida?")) return;

            try {
                const response = await fetch(`${BASE_URL}/${editKey}.json`, { method: 'DELETE' });
                if(response.ok) {
                    alert("Partida removida!");
                    resetForm();
                    listarJogos();
                }
            } catch (e) { alert("Erro ao excluir."); }
        }

        window.onload = listarJogos;
    </script>
</body>
</html>
