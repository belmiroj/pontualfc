<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lançar Presença | Pontual FC</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --bg-gray: #f4f4f4;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
        }

        /* --- HEADER REUTILIZADO --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-size: 1.8rem;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* --- CONTAINER ADMIN --- */
        .admin-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        label {
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        input, 
        select {
            padding: 10px;
            border: 1px solid #ddd;
        }

        /* --- GRID DE PRESENÇA --- */
        .presenca-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            background: #f9f9f9;
            padding: 20px;
            border: 1px solid #eee;
            margin: 20px 0;
        }

        .player-item {
            font-family: sans-serif;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-bvb {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            border: none;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        #json-final {
            margin-top: 20px;
            background: #f4f4f4;
            padding: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px dashed #666;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li><a href="jogos.html">Jogos</a></li>
                <li><a href="cadastrar-partida.html">Voltar</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <h2>Finalizar Jogo e Presença</h2>
        <form id="form-finalizar">
            <div class="form-group">
                <label>Selecione o Jogo (Pendentes)</label>
                <select id="jogo-select" required>
                    <option value="">Carregando jogos...</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Gols Pontual</label>
                    <input type="number" id="g-pro" value="0">
                </div>
                <div class="form-group">
                    <label>Gols Adversário</label>
                    <input type="number" id="g-contra" value="0">
                </div>
            </div>

            <label>Quem jogou?</label>
            <div id="lista-jogadores" class="presenca-grid">
                </div>

            <button type="submit" class="btn-bvb">Gerar Objeto Atualizado</button>
        </form>
        <div id="json-final"></div>
    </div>

    <script>
        const elenco = ["Jogador 1", "Jogador 2", "Jogador 3", "Jogador 4", "Jogador 5"];

        async function carregar() {
            const res = await fetch('jogos-2026.json');
            const data = await res.json();
            const select = document.getElementById('jogo-select');
            select.innerHTML = '<option value="">Selecione...</option>';
            
            data.temporada_2026.filter(j => j.status === 'upcoming').forEach(j => {
                select.innerHTML += `<option value="${j.id}" data-obj='${JSON.stringify(j)}'>${j.data} - vs ${j.visitante}</option>`;
            });

            const grid = document.getElementById('lista-jogadores');
            elenco.forEach(p => {
                grid.innerHTML += `<label class="player-item"><input type="checkbox" name="pres" value="${p}"> ${p}</label>`;
            });
        }

        document.getElementById('form-finalizar').onsubmit = function(e) {
            e.preventDefault();
            const sel = document.getElementById('jogo-select');
            const base = JSON.parse(sel.options[sel.selectedIndex].getAttribute('data-obj'));
            const marcados = Array.from(document.querySelectorAll('input[name="pres"]:checked')).map(c => c.value);
            
            const pro = parseInt(document.getElementById('g-pro').value);
            const contra = parseInt(document.getElementById('g-contra').value);
            let st = "empate";
            if(pro > contra) st = "vitoria";
            if(contra > pro) st = "derrota";

            const atualizado = { ...base, placar_mandante: pro, placar_visitante: contra, status: st, presenca: marcados };
            const div = document.getElementById('json-final');
            div.style.display = 'block';
            div.textContent = JSON.stringify(atualizado, null, 2);
        };

        window.onload = carregar;
    </script>
</body>
</html>
