<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontual FC | Dashboard</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --win: #2ecc71;
            --draw: #f1c40f;
            --loss: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
        }

        /* --- HEADER GLOBAL --- */
        header {
            background: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 70px;
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            left: 0;
            background: var(--bvb-black);
            min-width: 180px;
            list-style: none;
            padding: 10px 0;
            border-bottom: 3px solid var(--bvb-yellow);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .submenu li a {
            color: #fff;
            padding: 10px 20px;
            display: block;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .submenu li a:hover {
            background: #222;
            color: var(--bvb-yellow);
        }

        .nav-item:hover .submenu {
            display: block;
        }

        /* --- CONTEÚDO --- */
        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- CARDS DE ESTATÍSTICAS --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-bottom: 4px solid #ddd;
            transition: all 0.3s ease;
        }

        .card small {
            display: block;
            text-transform: uppercase;
            font-size: 0.65rem;
            color: #777;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card span {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .card.neutral {
            border-color: var(--bvb-black);
            color: var(--bvb-black);
        }

        /* --- TABELAS --- */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .table-box {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .table-box h3 {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            margin: 0;
            padding: 12px;
            font-size: 0.75rem;
            text-align: center;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 10px 12px;
            font-size: 0.8rem;
            border-bottom: 1px solid #eee;
        }

        .val {
            text-align: right;
            font-weight: bold;
            color: var(--bvb-black);
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 1000px) {
            .tables-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .stats-row, .tables-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="stats-row">
            <div class="card neutral"><small>Jogos</small><span id="stat-total">0</span></div>
            <div class="card" style="border-color: var(--win); color: var(--win)"><small>Vitórias</small><span id="stat-vitorias">0</span></div>
            <div class="card" style="border-color: var(--draw); color: var(--draw)"><small>Empates</small><span id="stat-empates">0</span></div>
            <div class="card" style="border-color: var(--loss); color: var(--loss)"><small>Derrotas</small><span id="stat-derrotas">0</span></div>
        </div>

        <div class="stats-row">
            <div class="card neutral"><small>Gols Pró</small><span id="stat-gp" style="color:var(--win)">0</span></div>
            <div class="card neutral"><small>Gols Contra</small><span id="stat-gc" style="color:var(--loss)">0</span></div>
            <div class="card neutral"><small>Saldo Gols</small><span id="stat-sg">0</span></div>
            <div class="card" id="card-aprov"><small>Aproveitamento</small><span id="stat-aprov">0%</span></div>
        </div>

        <div class="tables-grid">
            <div class="table-box">
                <h3>Artilharia</h3>
                <table><tbody id="lista-gols"></tbody></table>
            </div>
            <div class="table-box">
                <h3>Assistências</h3>
                <table><tbody id="lista-assist"></tbody></table>
            </div>
            <div class="table-box">
                <h3>Votos (MVP)</h3>
                <table><tbody id="lista-votos"></tbody></table>
            </div>
            <div class="table-box">
                <h3>Presenças</h3>
                <table><tbody id="lista-presencas"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://dashboard-pontualfc-default-rtdb.firebaseio.com/temporada_2026";

        async function carregar() {
            try {
                const resp = await fetch(`${BASE_URL}.json`);
                const data = await resp.json();
                
                if (!data) return;

                // Converter o objeto do Firebase em uma Array de jogos
                const jogos = Object.values(data);
                
                let t = 0, v = 0, e = 0, d = 0, gp = 0, gc = 0;
                let art = {}, ast = {}, pre = {}, vot = {};

                jogos.forEach(j => {
                    // Só processa estatísticas de jogos com status 'finished'
                    if (j.status === 'finished') {
                        t++;
                        
                        // Conta vitórias/empates/derrotas baseadas no resultado_tipo salvo
                        if (j.resultado_tipo === 'vitoria') v++;
                        else if (j.resultado_tipo === 'empate') e++;
                        else if (j.resultado_tipo === 'derrota') d++;
                        
                        // Soma de gols (assumindo que o Pontual FC é sempre o mandante no seu controle)
                        gp += (j.placar_mandante || 0);
                        gc += (j.placar_visitante || 0);
                        
                        // Detalhes Individuais
                        if (j.gols_detalhes) j.gols_detalhes.forEach(i => art[i.nome] = (art[i.nome] || 0) + i.qtd);
                        if (j.assist_detalhes) j.assist_detalhes.forEach(i => ast[i.nome] = (ast[i.nome] || 0) + i.qtd);
                        if (j.votos_melhor) j.votos_melhor.forEach(i => vot[i.nome] = (vot[i.nome] || 0) + i.qtd);
                        if (j.presencas) j.presencas.forEach(nome => pre[nome] = (pre[nome] || 0) + 1);
                    }
                });

                // Atualizar Números na Tela
                document.getElementById('stat-total').innerText = t;
                document.getElementById('stat-vitorias').innerText = v;
                document.getElementById('stat-empates').innerText = e;
                document.getElementById('stat-derrotas').innerText = d;
                document.getElementById('stat-gp').innerText = gp;
                document.getElementById('stat-gc').innerText = gc;
                document.getElementById('stat-sg').innerText = (gp - gc);

                // Cálculo de Aproveitamento
                const ptsGanhos = (v * 3) + (e * 1);
                const ptsPossiveis = t * 3;
                const perc = ptsPossiveis > 0 ? (ptsGanhos / ptsPossiveis) * 100 : 0;
                
                const elAprov = document.getElementById('stat-aprov');
                const cardAprov = document.getElementById('card-aprov');
                
                elAprov.innerText = perc.toFixed(1) + "%";

                // Cores dinâmicas do aproveitamento
                if (perc < 50) {
                    cardAprov.style.borderColor = "var(--loss)";
                    elAprov.style.color = "var(--loss)";
                } else if (perc >= 50 && perc < 70) {
                    cardAprov.style.borderColor = "var(--draw)";
                    elAprov.style.color = "var(--draw)";
                } else {
                    cardAprov.style.borderColor = "var(--win)";
                    elAprov.style.color = "var(--win)";
                }

                // Renderizar Tabelas de Rankings (Top 10)
                const render = (id, obj) => {
                    document.getElementById(id).innerHTML = Object.entries(obj)
                        .sort((x, y) => y[1] - x[1])
                        .slice(0, 10) // Mostra apenas o top 10 para não poluir
                        .map(i => `<tr><td>${i[0]}</td><td class="val">${i[1]}</td></tr>`)
                        .join('');
                };
                
                render('lista-gols', art);
                render('lista-assist', ast);
                render('lista-votos', vot);
                render('lista-presencas', pre);

            } catch (err) {
                console.error("Erro ao carregar dados do Firebase:", err);
            }
        }
        window.onload = carregar;
    </script>
</body>
</html>
