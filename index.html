<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontual FC | Dashboard</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --win: #2ecc71;
            --draw: #f1c40f;
            --loss: #e74c3c;
            --info: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
        }

        /* --- HEADER GLOBAL --- */
        header {
            background: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- GRID DE CARDS --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-bottom: 4px solid #ddd;
        }

        .card small {
            display: block;
            text-transform: uppercase;
            font-size: 0.65rem;
            color: #777;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card span {
            font-size: 1.8rem;
            font-weight: 800;
        }

        /* Cores fixas dos cards */
        .card.win {
            border-color: var(--win);
            color: var(--win);
        }

        .card.draw {
            border-color: var(--draw);
            color: var(--draw);
        }

        .card.loss {
            border-color: var(--loss);
            color: var(--loss);
        }

        .card.neutral {
            border-color: var(--bvb-black);
            color: var(--bvb-black);
        }

        /* --- TABELAS --- */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .table-box {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .table-box h3 {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            margin: 0;
            padding: 12px;
            font-size: 0.8rem;
            text-align: center;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid #eee;
        }

        .val {
            text-align: right;
            font-weight: bold;
        }

        @media (max-width: 800px) {
            .stats-row {
                grid-template-columns: 1fr 1fr;
            }
            .tables-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Cadastrar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="stats-row">
            <div class="card neutral"><small>Jogos</small><span id="stat-total">0</span></div>
            <div class="card win"><small>Vitórias</small><span id="stat-vitorias">0</span></div>
            <div class="card draw"><small>Empates</small><span id="stat-empates">0</span></div>
            <div class="card loss"><small>Derrotas</small><span id="stat-derrotas">0</span></div>
        </div>

        <div class="stats-row">
            <div class="card neutral"><small>Gols Pró</small><span id="stat-gp" style="color:var(--win)">0</span></div>
            <div class="card neutral"><small>Gols Contra</small><span id="stat-gc" style="color:var(--loss)">0</span></div>
            <div class="card neutral"><small>Saldo Gols</small><span id="stat-sg">0</span></div>
            <div class="card" id="card-aprov"><small>Aproveitamento</small><span id="stat-aprov">0%</span></div>
        </div>

        <div class="tables-grid">
            <div class="table-box"><h3>Artilharia</h3><table><tbody id="lista-gols"></tbody></table></div>
            <div class="table-box"><h3>Assistências</h3><table><tbody id="lista-assist"></tbody></table></div>
            <div class="table-box"><h3>Presenças</h3><table><tbody id="lista-presencas"></tbody></table></div>
        </div>
    </div>

    <script>
        async function carregar() {
            const resp = await fetch('jogos-2026.json');
            const data = await resp.json();
            const jogos = data.temporada_2026;
            let t = 0, v = 0, e = 0, d = 0, gp = 0, gc = 0, g = {}, a = {}, p = {};

            jogos.forEach(j => {
                if (j.status !== 'upcoming') {
                    t++;
                    if (j.status === 'vitoria') v++;
                    else if (j.status === 'empate') e++;
                    else if (j.status === 'derrota') d++;
                    
                    const isM = j.mandante === "PONTUAL FC";
                    gp += isM ? (j.placar_mandante || 0) : (j.placar_visitante || 0);
                    gc += isM ? (j.placar_visitante || 0) : (j.placar_mandante || 0);
                    
                    if (j.gols_detalhes) j.gols_detalhes.forEach(i => g[i.nome] = (g[i.nome] || 0) + i.qtd);
                    if (j.assist_detalhes) j.assist_detalhes.forEach(i => a[i.nome] = (a[i.nome] || 0) + i.qtd);
                    if (j.presencas) j.presencas.forEach(i => p[i] = (p[i] || 0) + 1);
                }
            });

            document.getElementById('stat-total').innerText = t;
            document.getElementById('stat-vitorias').innerText = v;
            document.getElementById('stat-empates').innerText = e;
            document.getElementById('stat-derrotas').innerText = d;
            document.getElementById('stat-gp').innerText = gp;
            document.getElementById('stat-gc').innerText = gc;
            document.getElementById('stat-sg').innerText = (gp - gc);

            // LOGICA DE COR DO APROVEITAMENTO
            const pts = (v * 3) + (e * 1);
            const totalPts = t * 3;
            const perc = totalPts > 0 ? (pts / totalPts) * 100 : 0;
            const elAprov = document.getElementById('stat-aprov');
            const cardAprov = document.getElementById('card-aprov');

            elAprov.innerText = perc.toFixed(1) + "%";

            if (perc < 50) {
                cardAprov.style.borderColor = "var(--loss)";
                elAprov.style.color = "var(--loss)";
            } else if (perc <= 59.9) {
                cardAprov.style.borderColor = "var(--draw)";
                elAprov.style.color = "var(--draw)";
            } else {
                cardAprov.style.borderColor = "var(--win)";
                elAprov.style.color = "var(--win)";
            }

            const render = (id, obj) => {
                document.getElementById(id).innerHTML = Object.entries(obj)
                    .sort((x, y) => y[1] - x[1])
                    .map(i => `<tr><td>${i[0]}</td><td class="val">${i[1]}</td></tr>`)
                    .join('');
            };
            
            render('lista-gols', g);
            render('lista-assist', a);
            render('lista-presencas', p);
        }
        window.onload = carregar;
    </script>
</body>
</html>
