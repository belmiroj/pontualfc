<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontual FC | Dashboard</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
            --bg-gray: #f4f4f4;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: var(--bvb-black);
        }

        /* --- HEADER & MENU GLOBAL --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 9999;
            height: 70px;
        }

        .logo {
            color: var(--bvb-yellow);
            font-size: 1.5rem;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav, nav ul {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            list-style: none;
        }

        .nav-item {
            position: relative;
            height: 100%;
        }

        .nav-link {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--bvb-yellow);
        }

        /* SUBMENU */
        .submenu {
            display: none;
            position: absolute;
            top: 70px; /* Alinhado ao final do header */
            left: 0;
            background: var(--bvb-black);
            min-width: 200px;
            border-top: 3px solid var(--bvb-yellow);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .nav-item:hover .submenu {
            display: block;
        }

        .submenu li a {
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.75rem;
            border-bottom: 1px solid #222;
        }

        .submenu li a:hover {
            background: #222;
            color: var(--bvb-yellow);
        }

        /* --- DASHBOARD --- */
        .container { padding: 30px 5%; }
        
        .resumo-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .resumo-item {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            padding: 15px;
            text-align: center;
            border-radius: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card-stats { background: #fff; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section-title { border-left: 5px solid var(--bvb-yellow); padding: 10px; margin: 0; font-size: 0.9rem; background: #f9f9f9; }
        .stats-table { width: 100%; border-collapse: collapse; }
        .stats-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .val-col { text-align: right; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="resumo-row">
            <div class="resumo-item"><small>JOGOS</small><div id="stat-total">0</div></div>
            <div class="resumo-item"><small>VITÓRIAS</small><div id="stat-vitorias">0</div></div>
            <div class="resumo-item"><small>GOLS PRÓ</small><div id="stat-gp">0</div></div>
            <div class="resumo-item"><small>APROV.</small><div id="stat-aprov">0%</div></div>
        </div>

        <div class="stats-grid">
            <div class="card-stats">
                <h3 class="section-title">Artilharia</h3>
                <table class="stats-table"><tbody id="lista-gols"></tbody></table>
            </div>
            <div class="card-stats">
                <h3 class="section-title">Assistências</h3>
                <table class="stats-table"><tbody id="lista-assist"></tbody></table>
            </div>
            <div class="card-stats">
                <h3 class="section-title">Presenças</h3>
                <table class="stats-table"><tbody id="lista-presencas"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        async function carregar() {
            const resp = await fetch('jogos-2026.json');
            const data = await resp.json();
            const jogos = data.temporada_2026;
            let t=0, v=0, gp=0, g={}, a={}, p={};
            jogos.forEach(j => {
                if(j.status !== 'upcoming'){
                    t++; if(j.status==='vitoria') v++;
                    gp += (j.mandante==="PONTUAL FC" ? j.placar_mandante : j.placar_visitante);
                    if(j.gols_detalhes) j.gols_detalhes.forEach(i => g[i.nome] = (g[i.nome]||0)+i.qtd);
                    if(j.assist_detalhes) j.assist_detalhes.forEach(i => a[i.nome] = (a[i.nome]||0)+i.qtd);
                    if(j.presencas) j.presencas.forEach(i => p[i] = (p[i]||0)+1);
                }
            });
            document.getElementById('stat-total').innerText = t;
            document.getElementById('stat-vitorias').innerText = v;
            document.getElementById('stat-gp').innerText = gp;
            document.getElementById('stat-aprov').innerText = t>0 ? ((v/t)*100).toFixed(0)+"%" : "0%";
            const render = (id, obj) => {
                document.getElementById(id).innerHTML = Object.entries(obj).sort((x,y)=>y[1]-x[1])
                .map(e => `<tr><td>${e[0]}</td><td class="val-col">${e[1]}</td></tr>`).join('');
            };
            render('lista-gols', g); render('lista-assist', a); render('lista-presencas', p);
        }
        window.onload = carregar;
    </script>
</body>
</html>
