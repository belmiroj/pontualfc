<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontual FC | Dashboard</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            color: var(--bvb-black);
        }

        /* --- HEADER & NAV --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { color: var(--bvb-yellow); font-size: 1.8rem; font-weight: bold; text-decoration: none; }
        
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: var(--text-light); text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; }
        nav a:hover { color: var(--bvb-yellow); }

        .dropdown { position: relative; }
        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: var(--bvb-black);
            min-width: 180px;
            border-top: 3px solid var(--bvb-yellow);
        }
        .submenu li { display: block; }
        .submenu a { padding: 12px; display: block; border-bottom: 1px solid #222; }
        .dropdown:hover .submenu { display: block; }

        /* --- LAYOUT --- */
        .container { padding: 40px 5%; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
        }

        .section-title {
            border-left: 6px solid var(--bvb-yellow);
            padding-left: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .stats-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .stat-value { text-align: right; font-weight: bold; }
        .stats-footer { background: var(--bvb-yellow); font-weight: bold; }

        .match-card {
            background: var(--bvb-black);
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 992px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li class="dropdown">
                    <a href="#">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="dropdown">
                    <a href="#">Cadastros ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Nova Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Placar/Gols</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="dashboard-grid">
            
            <section>
                <h2 class="section-title">Resumo 2026</h2>
                <table class="stats-table">
                    <tr><td>Jogos</td><td id="stat-jogos" class="stat-value">0</td></tr>
                    <tr><td>Vitórias</td><td id="stat-vitorias" class="stat-value">0</td></tr>
                    <tr><td>Saldo</td><td id="stat-saldo" class="stat-value">0</td></tr>
                    <tr class="stats-footer"><td>Aproveitamento</td><td id="stat-aproveitamento" class="stat-value">0%</td></tr>
                </table>
                
                <h2 class="section-title" style="margin-top:30px">Próximo Jogo</h2>
                <div id="home-match-card" class="match-card">
                    <div id="home-campeonato" style="color:var(--bvb-yellow); font-size:0.7rem">---</div>
                    <div style="display:flex; justify-content:space-around; align-items:center; margin:10px 0">
                        <span>PONTUAL</span>
                        <span style="color:var(--bvb-yellow)">VS</span>
                        <span id="home-adversario">---</span>
                    </div>
                    <div id="home-info" style="font-size:0.7rem; color:#ccc">---</div>
                </div>
            </section>

            <section>
                <h2 class="section-title">Artilharia</h2>
                <table class="stats-table">
                    <tbody id="corpo-artilharia"></tbody>
                </table>
            </section>

            <section>
                <h2 class="section-title">Assistências</h2>
                <table class="stats-table">
                    <tbody id="corpo-assistencias"></tbody>
                </table>
            </section>

        </div>
    </div>

    <script>
        async function carregarDashboard() {
            const resp = await fetch('jogos-2026.json');
            const data = await resp.json();
            const jogos = data.temporada_2026;

            let v=0, e=0, d=0, gp=0, gc=0, total=0;
            let artilharia = {}, assistencias = {};

            jogos.forEach(j => {
                if(j.status !== 'upcoming') {
                    total++;
                    if(j.status === 'vitoria') v++;
                    gp += (j.mandante === "PONTUAL FC" ? j.placar_mandante : j.placar_visitante);
                    gc += (j.mandante === "PONTUAL FC" ? j.placar_visitante : j.placar_mandante);
                    
                    // Processar Gols/Assis se existirem no JSON
                    if(j.gols_detalhes) {
                        j.gols_detalhes.forEach(g => artilharia[g.nome] = (artilharia[g.nome] || 0) + g.qtd);
                    }
                    if(j.assist_detalhes) {
                        j.assist_detalhes.forEach(a => assistencias[a.nome] = (assistencias[a.nome] || 0) + a.qtd);
                    }
                }
            });

            // Preencher Resumo
            document.getElementById('stat-jogos').innerText = total;
            document.getElementById('stat-vitorias').innerText = v;
            document.getElementById('stat-saldo').innerText = (gp - gc);
            document.getElementById('stat-aproveitamento').innerText = total > 0 ? ((v*3/ (total*3))*100).toFixed(1) + "%" : "0%";

            // Renderizar Rankings
            renderizarRanking('corpo-artilharia', artilharia);
            renderizarRanking('corpo-assistencias', assistencias);

            // Próximo Jogo
            const prox = jogos.find(j => j.status === 'upcoming');
            if(prox) {
                document.getElementById('home-adversario').innerText = prox.visitante;
                document.getElementById('home-campeonato').innerText = prox.campeonato;
                document.getElementById('home-info').innerText = `${prox.data} | ${prox.hora}`;
            }
        }

        function renderizarRanking(id, obj) {
            const html = Object.entries(obj)
                .sort((a,b) => b[1] - a[1])
                .map(item => `<tr><td>${item[0]}</td><td class="stat-value">${item[1]}</td></tr>`).join('');
            document.getElementById(id).innerHTML = html || "<tr><td>Nenhum dado</td></tr>";
        }

        window.onload = carregarDashboard;
    </script>
</body>
</html>
