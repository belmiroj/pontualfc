<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontual FC | Dashboard</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #111111;
            --bg-gray: #f4f7f6;
            --win: #2ecc71;
            --draw: #f1c40f;
            --loss: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: #333;
            font-size: 16px;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 4px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        .logo {
            color: var(--bvb-yellow);
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 15px;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 70px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--bvb-yellow);
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            right: 0;
            background: var(--bvb-black);
            min-width: 170px;
            list-style: none;
            padding: 10px 0;
            border-bottom: 3px solid var(--bvb-yellow);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .submenu li a {
            color: #fff;
            padding: 12px 20px;
            display: block;
            font-size: 0.8rem;
        }

        .submenu li a:hover {
            background: #222;
        }

        .nav-item:hover .submenu {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* --- CARD ÚLTIMA PARTIDA --- */
        .last-game-card {
            background: var(--bvb-black);
            color: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 5px solid var(--bvb-yellow);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .last-game-card small {
            text-transform: uppercase;
            color: var(--bvb-yellow);
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 0.7rem;
        }

        .last-game-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .lg-team {
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            flex: 1;
        }

        .lg-score {
            font-size: 2rem;
            font-weight: 900;
            background: rgba(255,255,255,0.1);
            padding: 5px 20px;
            border-radius: 8px;
            min-width: 100px;
        }

        /* --- CARDS DE ESTATÍSTICAS --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-bottom: 4px solid #ddd;
        }

        .card small {
            display: block;
            text-transform: uppercase;
            font-size: 0.6rem;
            color: #777;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card span {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .card.neutral {
            border-color: var(--bvb-black);
            color: var(--bvb-black);
        }

        /* --- TABELAS COM ROLAGEM --- */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 25px;
            align-items: start;
        }

        .table-box {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .table-box h3 {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            margin: 0;
            padding: 12px;
            font-size: 0.7rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .scroll-container {
            max-height: 320px;
            overflow-y: auto;
        }

        .scroll-container::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: var(--bvb-black);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 10px 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .val {
            text-align: right;
            font-weight: bold;
            color: var(--bvb-black);
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 1024px) {
            .tables-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .tables-grid {
                grid-template-columns: 1fr;
            }
            .card span {
                font-size: 1.3rem;
            }
            .logo {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html">Início</a></li>
                <li class="nav-item">
                    <a>Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a>Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div id="ultimo-jogo-container"></div>

        <div class="stats-row">
            <div class="card neutral"><small>Jogos</small><span id="stat-total">0</span></div>
            <div class="card" style="border-color: var(--win); color: var(--win)"><small>Vitórias</small><span id="stat-vitorias">0</span></div>
            <div class="card" style="border-color: var(--draw); color: var(--draw)"><small>Empates</small><span id="stat-empates">0</span></div>
            <div class="card" style="border-color: var(--loss); color: var(--loss)"><small>Derrotas</small><span id="stat-derrotas">0</span></div>
        </div>

        <div class="stats-row">
            <div class="card" style="border-color: var(--win); color: var(--win)"><small>Gols Pró</small><span id="stat-gp">0</span></div>
            <div class="card" style="border-color: var(--loss); color: var(--loss)"><small>Gols Contra</small><span id="stat-gc">0</span></div>
            <div class="card" id="card-sg"><small>Saldo Gols</small><span id="stat-sg">0</span></div>
            <div class="card" id="card-aprov"><small>Aproveitamento</small><span id="stat-aprov">0%</span></div>
        </div>

        <div class="tables-grid">
            <div class="table-box">
                <h3>⚽ Artilharia</h3>
                <div class="scroll-container">
                    <table><tbody id="lista-gols"></tbody></table>
                </div>
            </div>
            <div class="table-box">
                <h3>👟 Assistências</h3>
                <div class="scroll-container">
                    <table><tbody id="lista-assist"></tbody></table>
                </div>
            </div>
            <div class="table-box">
                <h3>🏆 Votos (MVP)</h3>
                <div class="scroll-container">
                    <table><tbody id="lista-votos"></tbody></table>
                </div>
            </div>
            <div class="table-box">
                <h3>📋 Presenças</h3>
                <div class="scroll-container">
                    <table><tbody id="lista-presencas"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://dashboard-pontualfc-default-rtdb.firebaseio.com/temporada_2026";

        async function carregar() {
            try {
                const resp = await fetch(`${BASE_URL}.json`);
                const data = await resp.json();
                if (!data) return;

                const jogos = Object.values(data);
                let t = 0, v = 0, e = 0, d = 0, gp = 0, gc = 0;
                let art = {}, ast = {}, pre = {}, vot = {};

                const jogosFinalizados = jogos
                    .filter(j => j.status === 'finished')
                    .sort((a, b) => new Date(b.data.split('/').reverse().join('-')) - new Date(a.data.split('/').reverse().join('-')));

                if (jogosFinalizados.length > 0) {
                    const ultimo = jogosFinalizados[0];
                    document.getElementById('ultimo-jogo-container').innerHTML = `
                        <div class="last-game-card">
                            <small>Último Resultado • ${ultimo.rodada || 'Confronto'}</small>
                            <div class="last-game-info">
                                <div class="lg-team" style="text-align:right">${ultimo.mandante}</div>
                                <div class="lg-score">${ultimo.placar_mandante} - ${ultimo.placar_visitante}</div>
                                <div class="lg-team" style="text-align:left">${ultimo.visitante}</div>
                            </div>
                            <div style="font-size: 0.7rem; margin-top: 10px; opacity: 0.8;">${ultimo.data}</div>
                        </div>
                    `;
                }

                jogos.forEach(j => {
                    if (j.status === 'finished') {
                        t++;
                        if (j.resultado_tipo === 'vitoria') v++;
                        else if (j.resultado_tipo === 'empate') e++;
                        else if (j.resultado_tipo === 'derrota') d++;
                        gp += (j.placar_mandante || 0);
                        gc += (j.placar_visitante || 0);
                        if (j.gols_detalhes) j.gols_detalhes.forEach(i => art[i.nome] = (art[i.nome] || 0) + i.qtd);
                        if (j.assist_detalhes) j.assist_detalhes.forEach(i => ast[i.nome] = (ast[i.nome] || 0) + i.qtd);
                        if (j.votos_melhor) j.votos_melhor.forEach(i => vot[i.nome] = (vot[i.nome] || 0) + i.qtd);
                        if (j.presencas) j.presencas.forEach(nome => pre[nome] = (pre[nome] || 0) + 1);
                    }
                });

                document.getElementById('stat-total').innerText = t;
                document.getElementById('stat-vitorias').innerText = v;
                document.getElementById('stat-empates').innerText = e;
                document.getElementById('stat-derrotas').innerText = d;
                document.getElementById('stat-gp').innerText = gp;
                document.getElementById('stat-gc').innerText = gc;

                const sg = gp - gc;
                const elSgValue = document.getElementById('stat-sg');
                const cardSg = document.getElementById('card-sg');
                elSgValue.innerText = sg;
                if (sg > 0) { cardSg.style.borderColor = "var(--win)"; elSgValue.style.color = "var(--win)"; }
                else if (sg === 0) { cardSg.style.borderColor = "var(--draw)"; elSgValue.style.color = "var(--draw)"; }
                else { cardSg.style.borderColor = "var(--loss)"; elSgValue.style.color = "var(--loss)"; }

                const ptsGanhos = (v * 3) + (e * 1);
                const ptsPossiveis = t * 3;
                const perc = ptsPossiveis > 0 ? (ptsGanhos / ptsPossiveis) * 100 : 0;
                const elAprov = document.getElementById('stat-aprov');
                const cardAprov = document.getElementById('card-aprov');
                elAprov.innerText = perc.toFixed(1) + "%";
                if (perc < 45) { cardAprov.style.borderColor = "var(--loss)"; elAprov.style.color = "var(--loss)"; }
                else if (perc >= 45 && perc < 65) { cardAprov.style.borderColor = "var(--draw)"; elAprov.style.color = "var(--draw)"; }
                else { cardAprov.style.borderColor = "var(--win)"; elAprov.style.color = "var(--win)"; }

                const render = (id, obj) => {
                    document.getElementById(id).innerHTML = Object.entries(obj)
                        .sort((x, y) => y[1] - x[1])
                        .map(i => `<tr><td>${i[0]}</td><td class="val">${i[1]}</td></tr>`)
                        .join('');
                };
                
                render('lista-gols', art);
                render('lista-assist', ast);
                render('lista-votos', vot);
                render('lista-presencas', pre);

            } catch (err) { console.error("Erro ao carregar dados:", err); }
        }
        window.onload = carregar;
    </script>
</body>
</html>
