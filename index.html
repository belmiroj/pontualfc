<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontual FC | Dashboard 2026</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
            --bg-gray: #f4f4f4;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: var(--bvb-black);
        }

        /* --- HEADER & MENU GLOBAL --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 9999;
            height: 70px;
        }

        .logo {
            color: var(--bvb-yellow);
            font-size: 1.5rem;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav, nav ul {
            height: 100%;
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-item {
            position: relative;
            height: 100%;
        }

        .nav-link {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--bvb-yellow);
        }

        .submenu {
            display: none;
            position: absolute;
            top: 70px;
            left: 0;
            background: var(--bvb-black);
            min-width: 200px;
            border-top: 3px solid var(--bvb-yellow);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .nav-item:hover .submenu {
            display: block;
        }

        .submenu li a {
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.75rem;
            border-bottom: 1px solid #222;
        }

        /* --- DASHBOARD LAYOUT --- */
        .container {
            padding: 30px 5%;
        }

        .resumo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .resumo-item {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            padding: 12px;
            text-align: center;
            border-radius: 4px;
        }

        .resumo-item small {
            display: block;
            color: #fff;
            font-size: 0.6rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .resumo-item div {
            font-size: 1.2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card-stats {
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .section-title {
            background: #f8f8f8;
            border-left: 6px solid var(--bvb-yellow);
            padding: 10px 15px;
            margin: 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-bottom: 1px solid #eee;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #f9f9f9;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .val-col {
            text-align: right;
            font-weight: bold;
            color: #000;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">PONTUAL FC</a>
        <nav>
            <ul>
                <li class="nav-item"><a href="index.html" class="nav-link">Início</a></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Jogos ▾</a>
                    <ul class="submenu">
                        <li><a href="jogos-2026.html">Temporada 2026</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Cadastro ▾</a>
                    <ul class="submenu">
                        <li><a href="cadastro-partida.html">Agendar Partida</a></li>
                        <li><a href="lancar-dados.html">Lançar Resultados</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="resumo-grid">
            <div class="resumo-item"><small>Jogos</small><div id="stat-total">0</div></div>
            <div class="resumo-item"><small>Vitórias</small><div id="stat-vitorias">0</div></div>
            <div class="resumo-item"><small>Empates</small><div id="stat-empates">0</div></div>
            <div class="resumo-item"><small>Derrotas</small><div id="stat-derrotas">0</div></div>
            <div class="resumo-item"><small>Gols Pró</small><div id="stat-gp">0</div></div>
            <div class="resumo-item"><small>Gols Contra</small><div id="stat-gc">0</div></div>
            <div class="resumo-item"><small>Saldo Gols</small><div id="stat-sg">0</div></div>
            <div class="resumo-item"><small>Aprov. %</small><div id="stat-aprov">0%</div></div>
        </div>

        <div class="stats-grid">
            <div class="card-stats">
                <h3 class="section-title">Artilharia ⚽</h3>
                <table class="stats-table"><tbody id="lista-gols"></tbody></table>
            </div>
            <div class="card-stats">
                <h3 class="section-title">Assistências 👟</h3>
                <table class="stats-table"><tbody id="lista-assist"></tbody></table>
            </div>
            <div class="card-stats">
                <h3 class="section-title">Presenças 🏟️</h3>
                <table class="stats-table"><tbody id="lista-presencas"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        async function carregarDashboard() {
            try {
                const resp = await fetch('jogos-2026.json');
                const data = await resp.json();
                const jogos = data.temporada_2026;

                let total = 0, vitorias = 0, empates = 0, derrotas = 0;
                let golsPro = 0, golsContra = 0;
                let artilharia = {}, assistencias = {}, presencas = {};

                jogos.forEach(j => {
                    if (j.status !== 'upcoming') {
                        total++;
                        
                        // Resultados
                        if (j.status === 'vitoria') vitorias++;
                        else if (j.status === 'empate') empates++;
                        else if (j.status === 'derrota') derrotas++;

                        // Saldo de Gols
                        if (j.mandante === "PONTUAL FC") {
                            golsPro += (j.placar_mandante || 0);
                            golsContra += (j.placar_visitante || 0);
                        } else {
                            golsPro += (j.placar_visitante || 0);
                            golsContra += (j.placar_mandante || 0);
                        }

                        // Individuais
                        if (j.gols_detalhes) j.gols_detalhes.forEach(g => artilharia[g.nome] = (artilharia[g.nome] || 0) + g.qtd);
                        if (j.assist_detalhes) j.assist_detalhes.forEach(a => assistencias[a.nome] = (assistencias[a.nome] || 0) + a.qtd);
                        if (j.presencas) j.presencas.forEach(p => presencas[p] = (presencas[p] || 0) + 1);
                    }
                });

                // Dom Manipulation
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-vitorias').innerText = vitorias;
                document.getElementById('stat-empates').innerText = empates;
                document.getElementById('stat-derrotas').innerText = derrotas;
                document.getElementById('stat-gp').innerText = golsPro;
                document.getElementById('stat-gc').innerText = golsContra;
                
                // Cálculo Saldo de Gols
                const saldo = golsPro - golsContra;
                document.getElementById('stat-sg').innerText = (saldo > 0 ? "+" : "") + saldo;

                // Cálculo de Aproveitamento % (Fórmula: Pontos ganhos / Pontos disputados)
                const pontosGanhos = (vitorias * 3) + (empates * 1);
                const pontosDisputados = total * 3;
                const aprovPercent = pontosDisputados > 0 ? ((pontosGanhos / pontosDisputados) * 100).toFixed(1) : 0;
                document.getElementById('stat-aprov').innerText = aprovPercent + "%";

                renderTable('lista-gols', artilharia);
                renderTable('lista-assist', assistencias);
                renderTable('lista-presencas', presencas);

            } catch (e) { console.error("Erro dashboard:", e); }
        }

        function renderTable(id, objeto) {
            const sorted = Object.entries(objeto).sort((a, b) => b[1] - a[1]);
            document.getElementById(id).innerHTML = sorted.map(([n, v]) => `
                <tr><td>${n}</td><td class="val-col">${v}</td></tr>
            `).join('') || "<tr><td>Sem dados</td></tr>";
        }

        window.onload = carregarDashboard;
    </script>
</body>
</html>
