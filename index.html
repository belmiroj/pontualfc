<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontual FC | Dashboard 2026</title>
    <style>
        :root {
            --bvb-yellow: #FDE100;
            --bvb-black: #000000;
            --text-light: #ffffff;
            --bg-gray: #f4f4f4;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            color: var(--bvb-black);
        }

        /* --- NAVEGAÇÃO --- */
        header {
            background-color: var(--bvb-black);
            border-bottom: 5px solid var(--bvb-yellow);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: var(--bvb-yellow);
            font-size: 1.8rem;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--bvb-yellow);
        }

        /* --- LAYOUT DASHBOARD --- */
        .container {
            padding: 30px 5%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .section-title {
            border-left: 6px solid var(--bvb-yellow);
            padding-left: 12px;
            margin-bottom: 15px;
            font-size: 1rem;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- TABELAS --- */
        .card-stats {
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-table th {
            background: #eee;
            font-size: 0.7rem;
            padding: 8px;
            text-align: left;
        }

        .stats-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .val-col {
            text-align: right;
            font-weight: bold;
            color: #000;
            width: 50px;
        }

        /* --- RESUMO TOPO --- */
        .resumo-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .resumo-item {
            background: var(--bvb-black);
            color: var(--bvb-yellow);
            padding: 15px;
            text-align: center;
            border-radius: 4px;
        }

        .resumo-item span {
            display: block;
            font-size: 0.7rem;
            color: #fff;
            margin-bottom: 5px;
        }

        /* --- MOBILE --- */
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: 1fr; }
            .resumo-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">PONTUAL FC</a>
    <nav>
        <ul>
            <li><a href="jogos-2026.html">Jogos</a></li>
            <li><a href="lancar-dados.html">Lançar Dados</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <div class="resumo-row">
        <div class="resumo-item"><span id="txt-jogos">JOGOS</span><div id="stat-total">0</div></div>
        <div class="resumo-item"><span>VITÓRIAS</span><div id="stat-vitorias">0</div></div>
        <div class="resumo-item"><span>GOLS PRÓ</span><div id="stat-gp">0</div></div>
        <div class="resumo-item"><span>APROVEITAMENTO</span><div id="stat-aprov">0%</div></div>
    </div>

    <div class="stats-grid">
        <div class="card-stats">
            <h3 class="section-title">Artilharia ⚽</h3>
            <table class="stats-table">
                <tbody id="lista-gols"></tbody>
            </table>
        </div>

        <div class="card-stats">
            <h3 class="section-title">Assistências 👟</h3>
            <table class="stats-table">
                <tbody id="lista-assist"></tbody>
            </table>
        </div>

        <div class="card-stats">
            <h3 class="section-title">Presenças 🏟️</h3>
            <table class="stats-table">
                <tbody id="lista-presencas"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function carregarDados() {
        const resp = await fetch('jogos-2026.json');
        const data = await resp.json();
        const jogos = data.temporada_2026;

        let totalGeral = 0, vitorias = 0, gp = 0;
        let artilharia = {}, assistencias = {}, presencas = {};

        jogos.forEach(j => {
            if (j.status !== 'upcoming') {
                totalGeral++;
                if (j.status === 'vitoria') vitorias++;
                gp += (j.mandante === "PONTUAL FC" ? j.placar_mandante : j.placar_visitante);

                // Contar Gols
                if (j.gols_detalhes) {
                    j.gols_detalhes.forEach(g => artilharia[g.nome] = (artilharia[g.nome] || 0) + g.qtd);
                }
                // Contar Assistências
                if (j.assist_detalhes) {
                    j.assist_detalhes.forEach(a => assistencias[a.nome] = (assistencias[a.nome] || 0) + a.qtd);
                }
                // Contar Presenças
                if (j.presencas) {
                    j.presencas.forEach(p => presencas[p] = (presencas[p] || 0) + 1);
                }
            }
        });

        // Atualizar Resumo
        document.getElementById('stat-total').innerText = totalGeral;
        document.getElementById('stat-vitorias').innerText = vitorias;
        document.getElementById('stat-gp').innerText = gp;
        document.getElementById('stat-aprov').innerText = totalGeral > 0 ? ((vitorias / totalGeral) * 100).toFixed(0) + "%" : "0%";

        // Renderizar Tabelas
        renderTable('lista-gols', artilharia);
        renderTable('lista-assist', assistencias);
        renderTable('lista-presencas', presencas);
    }

    function renderTable(id, objeto) {
        const sorted = Object.entries(objeto).sort((a, b) => b[1] - a[1]);
        const html = sorted.map(([nome, valor]) => `
            <tr>
                <td>${nome}</td>
                <td class="val-col">${valor}</td>
            </tr>
        `).join('');
        document.getElementById(id).innerHTML = html || "<tr><td>Sem dados</td></tr>";
    }

    window.onload = carregarDados;
</script>

</body>
</html>
